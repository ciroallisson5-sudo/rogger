<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Finalizar compra - Conforta Colchões">
  <title>Checkout - Conforta Colchões</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand:#1a56db; --brand-dark:#0f3a8e; --brand-soft:#eff6ff; --ink:#0f172a; --text:#1e293b; --muted:#64748b; --soft:#f8fafc; --line:#e2e8f0; --success:#16a34a; --danger:#dc2626; --warning:#f59e0b; --shadow:0 18px 42px rgba(15,23,42,0.09); }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; color: var(--text); background: #f8fafc; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input, select, textarea { font-family: inherit; outline: none; }
    .container { max-width: 680px; margin: 0 auto; padding: 0 20px; }
    .main { margin-top: 0; min-height: 100vh; background: #f8fafc; }
    .checkout-page { padding: 28px 0 56px; background: transparent; min-height: 100vh; }
    .checkout-back {
      display: inline-flex; align-items: center; gap: 6px; font-size: 0.88rem; font-weight: 800;
      color: var(--brand-dark); margin-bottom: 14px; padding: 6px 0;
    }
    .checkout-back:hover { text-decoration: underline; }
    .checkout-hero { margin-bottom: 22px; }
    .checkout-hero h1 { color: var(--ink); font-size: clamp(1.45rem, 4vw, 1.95rem); line-height: 1.1; letter-spacing: -0.04em; }
    .checkout-hero p { color: var(--muted); max-width: 40em; margin-top: 8px; font-size: 0.92rem; font-weight: 600; }
    .checkout-link-rows { display: grid; gap: 10px; margin-bottom: 20px; }
    .checkout-link-row {
      display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
      padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: #fff;
      box-shadow: 0 4px 14px rgba(15,23,42,0.04); transition: border-color 0.2s, background 0.2s;
    }
    .checkout-link-row:hover { border-color: #bfdbfe; background: var(--brand-soft); }
    .checkout-link-row .clr-stack { flex: 1; min-width: 0; }
    .checkout-link-row .clr-main { display: block; font-weight: 900; color: var(--ink); font-size: 0.95rem; letter-spacing: -0.02em; }
    .checkout-link-row .clr-sub { display: block; font-size: 0.8rem; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .checkout-link-row .clr-arrow { font-size: 1.35rem; color: #94a3b8; font-weight: 300; line-height: 1; flex-shrink: 0; }
    .checkout-modal { position: fixed; inset: 0; z-index: 4000; display: none; align-items: flex-end; justify-content: center; padding: 0; }
    .checkout-modal.open { display: flex; }
    .checkout-modal-backdrop { position: absolute; inset: 0; background: rgba(15,23,42,0.5); cursor: pointer; }
    .checkout-modal-panel {
      position: relative; z-index: 1; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
      background: #fff; border-radius: 22px 22px 0 0; padding: 20px 20px 26px;
      box-shadow: 0 -12px 40px rgba(15,23,42,0.18);
    }
    .checkout-modal-close {
      position: absolute; top: 12px; right: 12px; width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem; line-height: 1; color: #64748b;
      background: #f1f5f9; border: none; cursor: pointer;
    }
    .checkout-modal-close:hover { background: #e2e8f0; color: var(--ink); }
    .checkout-modal-panel h2 { font-size: 1.15rem; font-weight: 900; color: var(--ink); margin: 0 44px 14px 0; letter-spacing: -0.03em; }
    .checkout-save-card { display: flex; align-items: flex-start; gap: 10px; margin-top: 14px; font-size: 0.86rem; color: #475569; font-weight: 600; line-height: 1.35; cursor: pointer; }
    .checkout-save-card input { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--brand); flex-shrink: 0; cursor: pointer; }
    .checkout-save-card small { display: block; font-size: 0.74rem; font-weight: 600; color: var(--muted); margin-top: 4px; }
    @media (min-width: 560px) {
      .checkout-modal { align-items: center; padding: 20px; }
      .checkout-modal-panel { border-radius: 22px; padding: 24px 26px 28px; }
    }
    .checkout-layout { display: flex; flex-direction: column; gap: 20px; align-items: stretch; }
    .checkout-left { display: grid; gap: 18px; }
    .checkout-section { background: #ffffff; border: 1px solid var(--line); border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px rgba(15,23,42,0.04); }
    .section-head { display: flex; align-items: start; justify-content: space-between; gap: 16px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; margin-bottom: 18px; }
    .section-kicker { color: var(--brand); font-size: 0.74rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; }
    .checkout-section h2 { font-size: 1.18rem; font-weight: 900; color: var(--ink); letter-spacing: -0.035em; }
    .section-copy { color: var(--muted); font-size: 0.86rem; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 800; color: #475569; margin-bottom: 7px; }
    .form-input, .form-select, .form-textarea { width: 100%; min-height: 46px; padding: 11px 14px; border: 1.5px solid var(--line); border-radius: 14px; font-size: 0.92rem; color: var(--text); background: #ffffff; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-textarea { min-height: 88px; resize: vertical; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(26,86,219,0.10); }
    .field-error { border-color: var(--danger) !important; box-shadow: 0 0 0 4px rgba(220,38,38,0.08) !important; }
    .error-message { color: var(--danger); font-size: 0.78rem; font-weight: 700; margin-top: 5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 46px; padding: 12px 20px; border-radius: 14px; font-weight: 900; font-size: 0.9rem; transition: all 0.2s; cursor: pointer; }
    .btn-primary { background: var(--brand); color: #ffffff; box-shadow: 0 12px 24px rgba(26,86,219,0.18); }
    .btn-primary:hover { background: var(--brand-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.62; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: #fff; color: var(--brand-dark); border: 1.5px solid var(--line); }
    .btn-outline:hover { background: var(--brand-soft); border-color: #bfdbfe; }
    .btn-whatsapp { background: #16a34a; color: #fff; }
    .btn-block { width: 100%; }
    .btn-lg { min-height: 54px; font-size: 1rem; }
    .address-preview, .review-box, .payment-note { padding: 14px; border: 1px solid var(--line); border-radius: 16px; background: var(--soft); color: #475569; font-size: 0.9rem; }
    .payment-methods { display: grid; gap: 10px; }
    .payment-method-option { display: flex; align-items: center; gap: 12px; padding: 15px; border: 1.5px solid var(--line); border-radius: 18px; background: #ffffff; cursor: pointer; transition: all 0.2s; text-align: left; }
    .payment-method-option:hover { border-color: #94a3b8; transform: translateY(-1px); }
    .payment-method-option.active { border-color: var(--brand); background: var(--brand-soft); box-shadow: 0 8px 22px rgba(26,86,219,0.10); }
    .payment-method-icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--brand); background: #fff; border-radius: 14px; border: 1px solid #dbeafe; }
    .payment-method-info { flex: 1; }
    .payment-method-info strong { display: block; font-size: 0.92rem; color: var(--ink); }
    .payment-method-info small { font-size: 0.78rem; color: var(--muted); }
    .payment-method-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; color: transparent; }
    .payment-method-option.active .payment-method-check { border-color: var(--brand); background: var(--brand); color: #ffffff; }
    .order-summary-card { background: #ffffff; border: 1px solid var(--line); border-radius: 24px; position: static; box-shadow: var(--shadow); overflow: hidden; }
    .summary-toggle { display: none; }
    .order-summary-header { padding: 22px 24px 10px; }
    .order-summary-header h3 { font-size: 1.2rem; font-weight: 900; color: var(--ink); letter-spacing: -0.035em; }
    .order-summary-header p { color: var(--muted); font-size: 0.82rem; margin-top: 3px; }
    .order-summary-items { padding: 10px 24px; max-height: 300px; overflow-y: auto; }
    .order-summary-item { display: grid; grid-template-columns: 58px 1fr auto; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; align-items: center; }
    .order-summary-item:last-child { border-bottom: none; }
    .order-summary-item img { width: 58px; height: 58px; border-radius: 14px; object-fit: cover; background: #f1f5f9; }
    .osi-name { font-size: 0.86rem; font-weight: 800; color: var(--ink); line-height: 1.25; }
    .osi-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .osi-price { font-size: 0.88rem; font-weight: 900; color: var(--ink); white-space: nowrap; }
    .order-summary-totals { padding: 16px 24px 22px; border-top: 1px solid #f1f5f9; }
    .total-line { display: flex; justify-content: space-between; gap: 14px; font-size: 0.9rem; color: #475569; padding: 5px 0; }
    .total-line.total { font-size: 1.05rem; font-weight: 900; color: var(--ink); padding-top: 12px; border-top: 1px solid var(--line); margin-top: 8px; }
    .total-line.total span:last-child { color: var(--brand-dark); font-size: 1.55rem; letter-spacing: -0.04em; }
    .summary-installment { margin-top: 10px; padding: 10px 12px; text-align: center; border-radius: 14px; background: #f0fdf4; color: #166534; font-size: 0.84rem; font-weight: 900; }
    .trust-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 14px; }
    .trust-list span { padding: 8px; border-radius: 12px; background: var(--soft); color: #475569; font-size: 0.72rem; font-weight: 800; text-align: center; }
    .mobile-submit-bar { display: none; }
    .checkout-state, .success-card, .failure-card { max-width: 760px; margin: 0 auto; text-align: center; padding: 56px 24px; background: #fff; border: 1px solid var(--line); border-radius: 28px; box-shadow: var(--shadow); }
    .checkout-state svg, .success-card svg, .failure-card svg { margin: 0 auto 16px; display: block; color: var(--brand); }
    .checkout-state h2, .success-card h2, .failure-card h2 { color: var(--ink); font-size: clamp(1.7rem, 4vw, 2.4rem); letter-spacing: -0.055em; line-height: 1.05; margin-bottom: 8px; }
    .checkout-state p, .success-card p, .failure-card p { color: var(--muted); max-width: 580px; margin: 0 auto 20px; }
    .state-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .checkout-skeleton { display: flex; flex-direction: column; gap: 20px; }
    .sk-card { background: #fff; border: 1px solid var(--line); border-radius: 24px; padding: 24px; }
    .sk { display: block; position: relative; overflow: hidden; background: #e2e8f0; border-radius: 12px; }
    .sk::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.58), transparent); animation: shimmer 1.2s infinite; }
    .sk-line { height: 16px; margin-bottom: 14px; }
    .sk-input { height: 48px; margin-bottom: 14px; }
    .sk-summary { height: 280px; }
    .toast-container { position: fixed; top: 16px; right: 20px; z-index: 5000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 12px; font-size: 0.875rem; box-shadow: var(--shadow); animation: slideIn 300ms ease; min-width: 280px; }
    .toast-success { background: #dcfce7; color: #166534; border-left: 4px solid #16a34a; }
    .toast-error { background: #fef2f2; color: #991b1b; border-left: 4px solid #dc2626; }
    .toast-info { background: #eff6ff; color: #1e40af; border-left: 4px solid #1a56db; }
    .footer { background: #0f172a; color: #cbd5e1; padding: 30px 0; }
    .footer p { text-align: center; font-size: 0.85rem; color: #64748b; }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @media (max-width: 768px) {
      .container { padding: 0 14px; }
      .checkout-page { padding: 22px 0 92px; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .checkout-section { padding: 18px; border-radius: 20px; }
      .mobile-submit-bar { display: grid; grid-template-columns: 1fr 1.25fr; gap: 10px; align-items: center; position: fixed; left: 0; right: 0; bottom: 0; z-index: 1200; padding: 10px 14px; background: rgba(255,255,255,0.96); border-top: 1px solid var(--line); box-shadow: 0 -12px 30px rgba(15,23,42,0.12); }
      .mobile-submit-bar span { display: block; color: var(--muted); font-size: 0.72rem; font-weight: 800; }
      .mobile-submit-bar strong { color: var(--brand-dark); font-size: 1.1rem; font-weight: 900; }
    }
    @media (max-width: 520px) {
      .order-summary-item { grid-template-columns: 50px 1fr; }
      .osi-price { grid-column: 2; }
      .trust-list { grid-template-columns: 1fr; }
    }
    .checkout-profile-warn {
      background: #fef3c7; border: 1px solid #fde68a; color: #92400e;
      padding: 12px 14px; border-radius: 14px; font-size: 0.86rem; font-weight: 700; margin-bottom: 14px;
    }
    .checkout-profile-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .checkout-profile-grid > div {
      padding: 12px 14px; border-radius: 14px; background: #f8fafc; border: 1px solid var(--line);
    }
    .checkout-profile-grid > div span {
      display: block; font-size: 0.72rem; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .checkout-profile-grid > div strong { font-size: 0.95rem; color: var(--ink); font-weight: 800; word-break: break-word; }
    @media (max-width: 768px) {
      .checkout-profile-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="container checkout-page" id="checkoutApp">
      <div class="checkout-hero">
        <a href="carrinho.html" class="checkout-back" id="backToCartLink">← Voltar ao carrinho</a>
        <h1>Finalizar compra</h1>
        <p>Revise seus dados, a entrega e o pagamento em um fluxo simples.</p>
      </div>

      <div id="checkoutContent">
        <div class="checkout-skeleton" aria-label="Carregando checkout">
          <div class="sk-card">
            <span class="sk sk-line" style="width:38%"></span>
            <span class="sk sk-input"></span>
            <span class="sk sk-input"></span>
            <span class="sk sk-line" style="width:64%"></span>
          </div>
          <div class="sk-card"><span class="sk sk-summary"></span></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Conforta Colchões. Todos os direitos reservados.</p>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/asaas-payment.js"></script>
  <script>
    (function() {
      'use strict';

      var sb = null;
      var cartItems = [];
      var selectedMethod = 'CREDIT_CARD';
      var userAddresses = [];
      var selectedAddressId = null;
      var processingOrder = false;

      var PAYMENT_FALLBACK = {
        id: 'mock-payment-' + Date.now(),
        status: 'pending',
        pixQrCode: null,
        pixKey: null,
        invoiceUrl: null,
        boletoUrl: null,
        barCode: null
      };

      function lineQty(item) {
        var q = parseInt(item && item.quantity, 10);
        return (isFinite(q) && q > 0) ? q : 1;
      }

      function getCheckoutDocumentDigits() {
        var p = window.__checkoutProfile || {};
        return String(p.cpf_cnpj || '').replace(/\D/g, '');
      }

      function maskTaxIdDigits(d) {
        d = String(d || '').replace(/\D/g, '').slice(0, 14);
        if (d.length > 11) return d.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2}).*/, '$1.$2.$3/$4-$5');
        return d.replace(/^(\d{3})(\d{3})(\d{3})(\d{0,2}).*/, '$1.$2.$3-$4');
      }

      function buildCheckoutAccountSummary(user) {
        var prof = window.__checkoutProfile || {};
        var meta = (user && user.user_metadata) || {};
        var name = String(prof.full_name || meta.full_name || '').trim();
        var email = (user && user.email) ? String(user.email) : '';
        var phone = String(prof.phone || meta.phone || meta.whatsapp || '').trim();
        var docDigits = getCheckoutDocumentDigits();
        var docLabel = docDigits ? maskTaxIdDigits(docDigits) : 'Nao informado';
        var missing = [];
        if (!name || name.split(/\s+/).filter(Boolean).length < 2) missing.push('nome completo');
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) missing.push('e-mail da conta');
        if (phone.replace(/\D/g, '').length < 10) missing.push('telefone');
        if (!isValidBrazilTaxId(docDigits)) missing.push('CPF ou CNPJ valido');
        var warn = missing.length
          ? '<div class="checkout-profile-warn" role="alert">Complete em <strong>Meu perfil</strong>: ' + escHtml(missing.join(', ')) + '.</div>'
          : '';
        return warn +
          '<p class="section-copy" style="margin-top:0;margin-bottom:14px">Nome, telefone e documento vêm do seu perfil. O e-mail é o da sua conta de login.</p>' +
          '<div class="checkout-profile-grid">' +
          '<div><span>Nome</span><strong>' + escHtml(name || '—') + '</strong></div>' +
          '<div><span>E-mail</span><strong>' + escHtml(email || '—') + '</strong></div>' +
          '<div><span>Telefone</span><strong>' + escHtml(phone || '—') + '</strong></div>' +
          '<div><span>CPF / CNPJ</span><strong>' + escHtml(docLabel) + '</strong></div>' +
          '</div>' +
          '<a class="btn btn-outline btn-block" style="margin-top:16px" href="perfil.html#section-dados">Editar dados no perfil</a>';
      }

      function checkoutAccountSubtitle(user) {
        var p = window.__checkoutProfile || {};
        var meta = (user && user.user_metadata) || {};
        var name = String(p.full_name || meta.full_name || '').trim();
        var email = (user && user.email) ? String(user.email) : '';
        if (name && email) return escHtml((name.length > 28 ? name.slice(0, 26) + '…' : name) + ' · ' + email);
        return escHtml(email || name || 'Ver nome, e-mail, telefone e documento');
      }

      function checkoutAddressSubtitle(addr) {
        if (!addr) return 'Cadastre um endereco no perfil';
        var line = addressLine(addr);
        return escHtml(line.length > 72 ? line.slice(0, 70) + '…' : line);
      }

      function renderCheckoutModals(user, addresses, addrOptions, addr) {
        return '<div class="checkout-modal" id="checkoutModalAccount" role="dialog" aria-modal="true" aria-labelledby="checkoutModalAccountTitle">' +
          '<div class="checkout-modal-backdrop" tabindex="-1" data-checkout-modal-close="1"></div>' +
          '<div class="checkout-modal-panel">' +
          '<button type="button" class="checkout-modal-close" data-checkout-modal-close="1" aria-label="Fechar">&times;</button>' +
          '<h2 id="checkoutModalAccountTitle">Dados da conta</h2>' +
          '<div id="checkoutModalAccountInner">' + buildCheckoutAccountSummary(user) + '</div>' +
          '</div></div>' +
          '<div class="checkout-modal" id="checkoutModalAddress" role="dialog" aria-modal="true" aria-labelledby="checkoutModalAddressTitle">' +
          '<div class="checkout-modal-backdrop" tabindex="-1" data-checkout-modal-close="1"></div>' +
          '<div class="checkout-modal-panel">' +
          '<button type="button" class="checkout-modal-close" data-checkout-modal-close="1" aria-label="Fechar">&times;</button>' +
          '<h2 id="checkoutModalAddressTitle">Endereco de entrega</h2>' +
          (addresses.length > 0
            ? '<div class="form-group"><label for="addressSelect">Endereco cadastrado</label><select class="form-select" id="addressSelect" onchange="window.selectAddress(this.value)">' + addrOptions + '</select></div>' +
              '<div class="address-preview" id="addressPreview"><strong>Entrega selecionada</strong><br>' + escHtml(addressLine(addr)) + '<br><span>Entrega rapida em Serra, Vitoria e regiao.</span></div>' +
              '<a class="btn btn-outline btn-block" style="margin-top:14px" href="perfil.html#section-enderecos">Gerenciar enderecos no perfil</a>'
            : '<div class="address-preview"><strong>Nenhum endereco cadastrado.</strong><br>Cadastre um endereco no perfil para continuar.</div>' +
              '<a class="btn btn-primary btn-block" style="margin-top:14px" href="perfil.html#section-enderecos">Cadastrar endereco no perfil</a>'
          ) +
          '</div></div>';
      }

      var checkoutModalListenersBound = false;

      window.closeCheckoutModals = function() {
        document.querySelectorAll('.checkout-modal.open').forEach(function(m) {
          m.classList.remove('open');
        });
        document.body.style.overflow = '';
      };

      window.openCheckoutModal = function(which) {
        window.closeCheckoutModals();
        var id = which === 'address' ? 'checkoutModalAddress' : 'checkoutModalAccount';
        var m = document.getElementById(id);
        if (m) {
          m.classList.add('open');
          document.body.style.overflow = 'hidden';
        }
      };

      function wireCheckoutModals() {
        var acc = document.getElementById('btnCheckoutOpenAccount');
        if (acc) acc.onclick = function() { window.openCheckoutModal('account'); };
        var adr = document.getElementById('btnCheckoutOpenAddress');
        if (adr) adr.onclick = function() { window.openCheckoutModal('address'); };
        if (!checkoutModalListenersBound) {
          checkoutModalListenersBound = true;
          document.addEventListener('click', function(e) {
            var t = e.target;
            if (t && t.closest && t.closest('[data-checkout-modal-close]')) window.closeCheckoutModals();
          });
          document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') window.closeCheckoutModals();
          });
        }
      }

      function detectCardBrand(digits) {
        var d = String(digits || '').replace(/\D/g, '');
        if (/^4/.test(d)) return 'visa';
        if (/^5[1-5]/.test(d)) return 'mastercard';
        if (/^3[47]/.test(d)) return 'amex';
        if (/^6(?:011|5)/.test(d)) return 'discover';
        if (/^3(?:0|6|8)/.test(d)) return 'diners';
        if (/^6/.test(d)) return 'elo';
        return 'unknown';
      }

      async function maybeSavePaymentMethod(user) {
        var ck = document.getElementById('saveCardCheckout');
        if (!ck || !ck.checked || !sb || !user || selectedMethod !== 'CREDIT_CARD') return;
        var cardNumber = (document.getElementById('cardNumber') && document.getElementById('cardNumber').value || '').replace(/\D/g, '');
        var cardExpiry = (document.getElementById('cardExpiry') && document.getElementById('cardExpiry').value) || '';
        var cardName = (document.getElementById('cardName') && document.getElementById('cardName').value || '').trim();
        if (cardNumber.length < 13) return;
        var lastFour = cardNumber.slice(-4);
        if (!/^\d{4}$/.test(lastFour)) return;
        var parts = cardExpiry.split('/');
        if (parts.length < 2) return;
        var expM = parseInt(parts[0], 10);
        var expY = parseInt('20' + String(parts[1]).replace(/\D/g, '').slice(0, 2), 10);
        if (!isFinite(expM) || expM < 1 || expM > 12 || !isFinite(expY)) return;
        var brand = detectCardBrand(cardNumber);
        var row = {
          user_id: user.id,
          card_brand: brand,
          last_four: lastFour,
          exp_month: expM,
          exp_year: expY,
          holder_name: cardName || null
        };
        var ins = await sb.from('saved_payment_methods').insert(row);
        if (ins.error) {
          void ins.error;
        }
      }

      function validaCPF(cpf) {
        if (!cpf || cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
        var n = cpf.split('').map(function(x) { return parseInt(x, 10); });
        var s = 0;
        for (var i = 0; i < 9; i++) s += n[i] * (10 - i);
        var d1 = (s % 11) < 2 ? 0 : 11 - (s % 11);
        if (d1 !== n[9]) return false;
        s = 0;
        for (var j = 0; j < 10; j++) s += n[j] * (11 - j);
        var d2 = (s % 11) < 2 ? 0 : 11 - (s % 11);
        return d2 === n[10];
      }

      function validaCNPJ(cnpj) {
        if (!cnpj || cnpj.length !== 14 || /^(\d)\1+$/.test(cnpj)) return false;
        var n = cnpj.split('').map(function(x) { return parseInt(x, 10); });
        var w1 = [5, 4, 3, 2, 9, 8, 7, 6, 5, 4, 3, 2];
        var s = 0;
        for (var i = 0; i < 12; i++) s += n[i] * w1[i];
        var d1 = s % 11 < 2 ? 0 : 11 - (s % 11);
        if (d1 !== n[12]) return false;
        var w2 = [6, 5, 4, 3, 2, 9, 8, 7, 6, 5, 4, 3, 2];
        s = 0;
        for (var j = 0; j < 13; j++) s += n[j] * w2[j];
        var d2 = s % 11 < 2 ? 0 : 11 - (s % 11);
        return d2 === n[13];
      }

      function isValidBrazilTaxId(digits) {
        if (!digits) return false;
        if (digits.length === 11) return validaCPF(digits);
        if (digits.length === 14) return validaCNPJ(digits);
        return false;
      }

      function escHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }

      function checkoutTotal() {
        return cartItems.reduce(function(acc, item) {
          return acc + getItemPrice(item) * lineQty(item);
        }, 0);
      }

      function installmentText(total) {
        var installments = typeof calcInstallments === 'function' ? calcInstallments(total, 12, 20) : [];
        if (installments && installments.length > 0) {
          var best = installments[installments.length - 1];
          return 'ou ' + best.qtd + 'x de ' + formatPrice(best.valor) + ' sem juros';
        }
        return 'Pagamento facilitado';
      }

      function selectedAddress() {
        return userAddresses.find(function(a) { return String(a.id) === String(selectedAddressId); }) || userAddresses[0] || null;
      }

      function addressLine(address) {
        if (!address) return '';
        return [
          address.street + (address.number ? ', ' + address.number : ''),
          address.complement,
          address.neighborhood,
          (address.city || '') + (address.state ? '/' + address.state : ''),
          address.zip_code || address.cep
        ].filter(Boolean).join(' - ');
      }

      function normalizeWhatsapp(raw) {
        var digits = String(raw || '').replace(/\D/g, '');
        if (!digits) return '';
        return (digits.length === 10 || digits.length === 11) ? '55' + digits : digits;
      }

      function checkoutWhatsappMessage() {
        var total = checkoutTotal();
        var products = cartItems.map(function(item) {
          return lineQty(item) + 'x ' + getItemName(item);
        }).join(', ');
        var prof = window.__checkoutProfile || {};
        var u = window.__checkoutUser;
        var meta = (u && u.user_metadata) || {};
        var name = String(prof.full_name || meta.full_name || '').trim();
        var addr = selectedAddress();
        return 'Ola! Estou finalizando uma compra no site da Conforta Colchões e preciso de ajuda.' +
          (name ? '\nNome: ' + name : '') +
          (products ? '\nProdutos: ' + products : '') +
          (total ? '\nTotal: ' + formatPrice(total) : '') +
          (addr ? '\nEntrega: ' + addressLine(addr) : '');
      }

      function checkoutWhatsappHref() {
        var message = checkoutWhatsappMessage();
        if (window.CONFORTA_WHATSAPP_URL) return window.CONFORTA_WHATSAPP_URL + '?text=' + encodeURIComponent(message);
        return '#';
      }

      async function configureWhatsapp() {
        if (!window.CONFORTA_WHATSAPP_URL) {
          try {
            var phone = '';
            if (typeof getSetting === 'function') phone = await getSetting('whatsapp_number');
            if (!phone && typeof getSetting === 'function') phone = await getSetting('contact_phone');
            var normalized = normalizeWhatsapp(phone);
            if (normalized) window.CONFORTA_WHATSAPP_URL = 'https://wa.me/' + normalized;
          } catch(e) {}
        }
        updateWhatsappLinks();
      }

      function updateWhatsappLinks() {
        document.querySelectorAll('.js-checkout-whatsapp').forEach(function(link) {
          link.href = checkoutWhatsappHref();

            link.target = '_blank';

          } else {
            link.onclick = function(e) {

      function clearFieldErrors() {
        document.querySelectorAll('.field-error').forEach(function(el) { el.classList.remove('field-error'); });
        document.querySelectorAll('.error-message').forEach(function(el) { el.remove(); });

      function setFieldError(id, message) {
        var el = document.getElementById(id);
        if (!el) return;
        el.classList.add('field-error');
        el.setAttribute('aria-invalid', 'true');
        var msg = document.createElement('div');
        msg.className = 'error-message';
        msg.id = id + 'Error';
        msg.textContent = message;
        el.setAttribute('aria-describedby', msg.id);
        el.insertAdjacentElement('afterend', msg);

      document.addEventListener('DOMContentLoaded', async function() {
        if (typeof initSupabase === 'function') initSupabase();

        configureWhatsapp();
        var backToCart = document.getElementById('backToCartLink');

              '</div>';
            return;
          }

          var items = await getCartItems();
          if (!items || items.length === 0) {
            container.innerHTML =
              '<div class="checkout-state">' +
              '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>' +
              '<h2>Seu carrinho esta vazio</h2>' +
              '<p>Adicione um produto antes de finalizar a compra.</p>' +
              '<div class="state-actions"><a href="produtos.html" class="btn btn-primary">Ver colchões</a><a href="carrinho.html" class="btn btn-outline">Ir ao carrinho</a></div>' +
              '</div>';
            return;
          }

          cartItems = items;

          var addresses = [];
          try {
            var addrResp = await sb.from('addresses').select('*').eq('user_id', user.id).order('is_default', { ascending: false });
            addresses = addrResp.data || [];
          } catch(e) {}
          userAddresses = addresses;

          var defaultAddr = addresses.find(function(a) { return a.is_default; }) || addresses[0] || null;
          selectedAddressId = defaultAddr ? defaultAddr.id : null;

          window.__checkoutUser = user;
          try {
            if (typeof getProfile === 'function') {
              window.__checkoutProfile = await getProfile(user.id);
            } else {
              var pr = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
              window.__checkoutProfile = pr.data || {};
            }
          } catch (e) {
            window.__checkoutProfile = {};
          }
          if (!window.__checkoutProfile || typeof window.__checkoutProfile !== 'object') {
            window.__checkoutProfile = {};
          }

          renderCheckout(items, addresses, defaultAddr, user);
          renderPaymentMethods();
          checkGatewayAvailability();
        } catch(e) {
          container.innerHTML = '<div class="checkout-state"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v5"/><path d="M12 17h.01"/></svg><h2>Nao foi possivel carregar o checkout</h2><p>Tente novamente em instantes.</p><div class="state-actions"><button class="btn btn-primary" onclick="location.reload()">Tentar novamente</button><a href="carrinho.html" class="btn btn-outline">Voltar ao carrinho</a></div></div>';
        }
      }

      function renderCheckout(items, addresses, defaultAddr, user) {
        var container = document.getElementById('checkoutContent');
        var total = items.reduce(function(acc, item) { return acc + getItemPrice(item) * lineQty(item); }, 0);
        var addr = selectedAddress() || defaultAddr || null;

        var addrOptions = addresses.map(function(a) {
          var selected = a.id === selectedAddressId ? 'selected' : '';
          var label = a.label || 'Endereco';
          return '<option value="' + escHtml(a.id) + '" ' + selected + '>' + escHtml(label + ': ' + addressLine(a)) + '</option>';
        }).join('');

        container.innerHTML =
          '<div class="checkout-link-rows">' +
          '<button type="button" class="checkout-link-row" id="btnCheckoutOpenAccount">' +
          '<span class="clr-stack"><span class="clr-main">Dados da conta</span><span class="clr-sub">' + checkoutAccountSubtitle(user) + '</span></span>' +
          '<span class="clr-arrow" aria-hidden="true">›</span></button>' +
          '<button type="button" class="checkout-link-row" id="btnCheckoutOpenAddress">' +
          '<span class="clr-stack"><span class="clr-main">Endereco de entrega</span><span class="clr-sub">' + checkoutAddressSubtitle(addr) + '</span></span>' +

          renderSummary(items, total) +
          '<div class="checkout-left">' +

          '<div class="checkout-section">' +
          '<div class="section-head"><div><h2>Pagamento</h2><p class="section-copy">Escolha uma forma de pagamento disponivel para este pedido.</p></div></div>' +
          '<div class="payment-methods" id="paymentMethods"></div>' +
          '<div class="payment-note" id="paymentInstruction" style="margin-top:12px"></div>' +
          '</div>' +

          renderCreditCardForm() +

          '<div class="checkout-section">' +
          '<div class="section-head"><div><h2>Revisao</h2><p class="section-copy">Confira tudo antes de confirmar o pedido.</p></div></div>' +
          '<div class="review-box" id="reviewBox">' + renderReview(addr, total) + '</div>' +
          '</div>' +

          '<button class="btn btn-primary btn-block btn-lg" id="placeOrderBtn" onclick="window.placeOrder()">' +
          'Confirmar pedido - ' + formatPrice(total) +
          '</button>' +

          '</div>' +

          renderCheckoutModals(user, addresses, addrOptions, addr);

      function hydrateCustomerFields() {
        updateReviewCustomer();
      }

      function renderReview(addr, total) {
        return '<strong>Dados finais</strong><br>' +
          '<span id="reviewCustomer">Cliente: dados do perfil</span><br>' +
          '<span>Entrega: ' + escHtml(addr ? addressLine(addr) : 'cadastre um endereco no perfil') + '</span><br>' +
          '<span>Pagamento: ' + escHtml(paymentLabel(selectedMethod)) + '</span><br>' +
          '<span>Total: ' + formatPrice(total) + '</span>';
      }

      function renderSummary(items, total) {
        return '<div class="order-summary-card" id="orderSummaryCard">' +
          '<div class="summary-body">' +
          '<div class="order-summary-header"><h3>Seu pedido</h3><p>Itens e valores desta compra.</p></div>' +
          '<div class="order-summary-items" id="summaryItems">' +
          items.map(function(item) {
            var price = getItemPrice(item);
            var qty = lineQty(item);
            var img = escHtml(getItemImage(item));
            var name = escHtml(getItemName(item));
            var color = escHtml(getItemColor(item) || '');
            return '<div class="order-summary-item">' +
              '<img src="' + img + '" alt="' + name + '" loading="lazy" decoding="async">' +
              '<div class="osi-info"><div class="osi-name">' + name + '</div>' +
              '<div class="osi-desc">' + (color ? 'Cor: ' + color + ' | ' : '') + 'Qtd: ' + qty + '</div></div>' +
              '<div class="osi-price">' + formatPrice(price * qty) + '</div>' +
              '</div>';
          }).join('') +
          '</div>' +
          '<div class="order-summary-totals">' +
          '<div class="total-line"><span>Subtotal</span><span>' + formatPrice(total) + '</span></div>' +
          '<div class="total-line"><span>Desconto</span><span>R$ 0,00</span></div>' +
          '<div class="total-line"><span>Frete</span><span>A confirmar</span></div>' +
          '<div class="total-line total"><span>Total</span><span>' + formatPrice(total) + '</span></div>' +
          '<div class="summary-installment">' + installmentText(total) + '</div>' +
          '<div class="trust-list"><span>Compra segura</span><span>Dados protegidos</span></div>' +
          '</div></div></div>';

      function paymentLabel(method) {
        if (method === 'PIX') return 'PIX';
        if (method === 'BOLETO') return 'Boleto bancario';
        if (method === 'CREDIT_CARD') return 'Cartao de credito';
        return 'Pagamento';
      }

      function paymentInstruction(method) {
        if (method === 'PIX') return 'Apos finalizar, voce recebera as informacoes para pagamento via PIX.';
        if (method === 'BOLETO') return 'O boleto sera gerado apos a confirmacao do pedido, com vencimento em 3 dias.';
        if (method === 'CREDIT_CARD') return 'Pagamento seguro e facilitado. Confira os dados do cartao antes de confirmar.';
        return 'Confirme disponibilidade com a loja.';

      function renderCreditCardForm() {
        return '<div class="checkout-section" id="cardForm" style="' + (selectedMethod === 'CREDIT_CARD' ? '' : 'display:none') + '">' +
          '<div class="section-head"><div><h2>Dados do cartao</h2><p class="section-copy">Os dados sao usados somente para processar este pagamento.</p></div></div>' +
          '<div class="form-group"><label for="cardNumber">Numero do cartao</label><input class="form-input" id="cardNumber" inputmode="numeric" autocomplete="cc-number" placeholder="0000 0000 0000 0000" maxlength="19"></div>' +

          '<div class="form-group"><label for="cardExpiry">Validade</label><input class="form-input" id="cardExpiry" inputmode="numeric" autocomplete="cc-exp" placeholder="MM/AA" maxlength="5"></div>' +
          '<div class="form-group"><label for="cardCvv">CVV</label><input class="form-input" id="cardCvv" inputmode="numeric" autocomplete="cc-csc" placeholder="123" maxlength="4"></div>' +

          '</label>' +

      function bindMasks() {
        var card = document.getElementById('cardNumber');
        var exp = document.getElementById('cardExpiry');
        if (card) card.addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim().slice(0, 19); });
        if (exp) exp.addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').replace(/^(\d{2})(\d)/, '$1/$2').slice(0, 5); });
      }

      function updateReviewCustomer() {
        var el = document.getElementById('reviewCustomer');
        if (!el) return;
        var u = window.__checkoutUser;
        var p = window.__checkoutProfile || {};
        if (!u) {
          el.textContent = 'Cliente: faca login';
          return;
        }
        var meta = u.user_metadata || {};
        var name = String(p.full_name || meta.full_name || '').trim();
        var email = String(u.email || '').trim();
        var phone = String(p.phone || meta.phone || meta.whatsapp || '').trim();
        var parts = [];
        if (name) parts.push(name);
        if (email) parts.push(email);
        if (phone) parts.push(phone);
        el.textContent = parts.length ? ('Cliente: ' + parts.join(' | ')) : 'Cliente: complete seus dados no perfil';
      }

      function renderPaymentMethods() {
        var container = document.getElementById('paymentMethods');
        if (!container) return;
        container.innerHTML = renderPaymentOptions(selectedMethod);
        var instruction = document.getElementById('paymentInstruction');
        if (instruction) instruction.textContent = paymentInstruction(selectedMethod);
        container.querySelectorAll('.payment-method-option').forEach(function(el) {
          el.addEventListener('click', function() {
            selectedMethod = this.getAttribute('data-method');
            renderPaymentMethods();
            var cardForm = document.getElementById('cardForm');
            if (cardForm) {
              cardForm.style.display = selectedMethod === 'CREDIT_CARD' ? 'block' : 'none';
            }
            var review = document.getElementById('reviewBox');
            if (review) review.innerHTML = renderReview(selectedAddress(), checkoutTotal());
          });
        });
      }

      async function checkGatewayAvailability() {
        try {
          var paymentApiOk = (typeof isAsaasPaymentApiAvailable === 'function') ? await isAsaasPaymentApiAvailable() : false;
          var pm = document.getElementById('paymentMethods');
          if (!pm) return;
          if (document.getElementById('checkoutPaymentEnvWarn')) return;
          var msg = '';
          if (!paymentApiOk) {
            msg =
              (typeof window !== 'undefined' && window.__confortaAsaasApiHint && String(window.__confortaAsaasApiHint).trim()) ||
              'Pagamento online indisponivel no momento. Seu pedido ainda pode ser registrado; entre em contato com a loja.';
          }
          if (msg) {
            var warn = document.createElement('div');
            warn.id = 'checkoutPaymentEnvWarn';
            warn.style.cssText = 'background:#fef3c7;border:1px solid #fde68a;color:#92400e;padding:10px 12px;border-radius:6px;font-size:0.82rem;margin-bottom:12px;';
            warn.textContent = msg;
            pm.parentNode.insertBefore(warn, pm);
          }
        } catch (e) { /* silent */ }
      }

      window.selectAddress = function(addressId) {
        selectedAddressId = addressId;
        var preview = document.getElementById('addressPreview');
        var addr = selectedAddress();
        if (preview && addr) preview.innerHTML = '<strong>Entrega selecionada</strong><br>' + escHtml(addressLine(addr)) + '<br><span>Entrega rapida em Serra, Vitoria e regiao.</span>';
        var review = document.getElementById('reviewBox');
        if (review) review.innerHTML = renderReview(addr, checkoutTotal());
        updateWhatsappLinks();
      };

      window.placeOrder = async function() {
        if (processingOrder) return;
        clearFieldErrors();
        var btn = document.getElementById('placeOrderBtn');
        var total = checkoutTotal();

        try {
          var user = await checkAuth();
          if (!user) {
            showToast('Faca login para finalizar a compra.', 'error');
            return;
          }

          var prof = window.__checkoutProfile || {};
          var meta = user.user_metadata || {};
          var customerName = String(prof.full_name || meta.full_name || '').trim();
          var customerEmail = String(user.email || '').trim();
          var customerPhone = String(prof.phone || meta.phone || meta.whatsapp || '').trim();
          var hasValidationError = false;
          if (!customerName || customerName.split(/\s+/).filter(Boolean).length < 2) {
            showToast('Complete seu nome completo em Meu perfil antes de finalizar.', 'error');
            hasValidationError = true;
          }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(customerEmail)) {
            showToast('Sua conta precisa de um e-mail valido.', 'error');
            hasValidationError = true;
          }
          if (customerPhone.replace(/\D/g, '').length < 10) {
            showToast('Cadastre um telefone em Meu perfil antes de finalizar.', 'error');
            hasValidationError = true;
          }
          if (!selectedAddressId && userAddresses.length > 0) {
            showToast('Selecione um endereco de entrega.', 'error');
            hasValidationError = true;
          }
          if (!selectedAddressId && userAddresses.length === 0) {
            showToast('Cadastre um endereco em Meu perfil para continuar.', 'error');
            hasValidationError = true;
          }
          if (hasValidationError) {
            return;
          }

          if (selectedMethod === 'PIX' || selectedMethod === 'BOLETO' || selectedMethod === 'CREDIT_CARD') {
            var taxIdDigits = getCheckoutDocumentDigits();
            if (!isValidBrazilTaxId(taxIdDigits)) {
              showToast('Cadastre um CPF ou CNPJ valido em Meu perfil para este pagamento.', 'error');
              return;
            }
          }
          if (selectedMethod === 'CREDIT_CARD') {
            var cardNumber = document.getElementById('cardNumber')?.value?.replace(/\D/g, '') || '';
            var cardExpiry = document.getElementById('cardExpiry')?.value || '';
            var cardCvv = document.getElementById('cardCvv')?.value?.replace(/\D/g, '') || '';
            var cardName = (document.getElementById('cardName')?.value || '').trim();
            var cardInvalid = false;
            if (cardNumber.length < 13) { setFieldError('cardNumber', 'Confira o numero do cartao.'); cardInvalid = true; }
            if (!/^\d{2}\/\d{2}$/.test(cardExpiry)) { setFieldError('cardExpiry', 'Informe a validade no formato MM/AA.'); cardInvalid = true; }
            if (cardCvv.length < 3) { setFieldError('cardCvv', 'Informe o codigo de seguranca.'); cardInvalid = true; }
            if (!cardName) { setFieldError('cardName', 'Informe o nome impresso no cartao.'); cardInvalid = true; }
            if (cardInvalid) {
              showToast('Confira os dados do cartao.', 'error');
              document.querySelector('.field-error')?.focus();
              return;
            }
          }

          processingOrder = true;
          if (btn) { btn.disabled = true; btn.textContent = 'Finalizando pedido...'; }

          var orderNumber = generateOrderNumber();

          var orderData = {
            user_id: user.id,
            order_number: orderNumber,
            status: 'pending',
            payment_status: 'pending',
            payment_method: selectedMethod,
            total_amount: total,
            shipping_amount: 0,
            discount_amount: 0,
            shipping_address_id: selectedAddressId || null,
            notes: ''
          };

          var orderResult;
          var orderInsert = await sb.from('orders').insert(orderData).select();
          if (orderInsert.error) {
            var em = orderInsert.error.message || '';
            if (/row-level security|RLS/i.test(em)) {
              throw new Error('Permissao do banco bloqueou a criacao do pedido. Rode o arquivo database/checkout_fixes.sql no Supabase.');
            }
            throw orderInsert.error;
          }
          orderResult = orderInsert.data;

          if (!orderResult || orderResult.length === 0) throw new Error('Erro ao criar pedido');
          var order = orderResult[0];

          for (var i = 0; i < cartItems.length; i++) {
            var item = cartItems[i];
            var itemData = {
              order_id: order.id,
              product_id: item.product_id,
              photo_id: item.photo_id,
              product_name: getItemName(item),
              photo_url: getItemImage(item),
              quantity: lineQty(item),
              unit_price: getItemPrice(item),
              color_name: getItemColor(item) || null
            };
            var itemRes = await sb.from('order_items').insert(itemData);
            if (itemRes.error) {
              if (/row-level security|RLS/i.test(itemRes.error.message || '')) {
                throw new Error('Permissao do banco bloqueou os itens do pedido. Rode database/checkout_fixes.sql no Supabase.');
              }
              throw itemRes.error;
            }
          }

          try {
            var stockRes = await sb.rpc('decrement_stock_for_order', { p_order_id: order.id });
            if (stockRes && stockRes.error) {
              void stockRes.error;
            }
          } catch (stockErr) {
            void stockErr;
          }

          // Process payment
          var paymentResult = null;
          var customerData = {
            user_id: user.id,
            name: customerName || user.user_metadata?.full_name || 'Cliente',
            email: customerEmail || user.email,
            phone: customerPhone || user.user_metadata?.phone || '',
            document: getCheckoutDocumentDigits()
          };

          var orderPaymentData = {
            customer: customerData,
            total: total,
            orderNumber: orderNumber,
            orderId: order.id,
            card: selectedMethod === 'CREDIT_CARD' ? {
              number: document.getElementById('cardNumber')?.value?.replace(/\s/g, '') || '',
              holderName: document.getElementById('cardName')?.value || '',
              expiryMonth: document.getElementById('cardExpiry')?.value?.split('/')[0] || '',
              expiryYear: '20' + (document.getElementById('cardExpiry')?.value?.split('/')[1] || ''),
              ccv: document.getElementById('cardCvv')?.value || ''
            } : null
          };

          switch (selectedMethod) {
            case 'PIX':
              paymentResult = await processPixPayment(orderPaymentData);
              break;
            case 'CREDIT_CARD':
              paymentResult = await processCreditCardPayment(orderPaymentData);
              break;
            case 'BOLETO':
              paymentResult = await processBoletoPayment(orderPaymentData);
              break;
            default:
              paymentResult = PAYMENT_FALLBACK;
          }

          if (!paymentResult) {
            showOrderConfirmation(order, null);
            return;
          }

          try { await clearCart(); } catch(e) {}

          if (selectedMethod === 'CREDIT_CARD' && paymentResult) {
            try {
              await maybeSavePaymentMethod(user);
            } catch (saveErr) {
              void saveErr;
            }
          }

          showOrderConfirmation(order, paymentResult);

        } catch(e) {
          showCheckoutFailure(e, total);
          if (btn) { btn.disabled = false; btn.textContent = 'Confirmar pedido - ' + formatPrice(total); }
        } finally {
          processingOrder = false;
        }
      };

      function showOrderConfirmation(order, payment) {
        var container = document.getElementById('checkoutContent');
        var statusMsg = '';
        var paymentInfo = '';
        var paymentFailed = !payment;

        if (paymentFailed) {
          statusMsg =
            '<strong style="color:#b45309">Pagamento nao foi concluido agora.</strong> Seu pedido foi registrado e aparece como pendente. Nenhum valor foi cobrado. ' +
            'Tente finalizar o pagamento de novo em instantes ou entre em contato com a loja.';
        } else {
          switch (selectedMethod) {
            case 'PIX':
              statusMsg = 'Pagamento via PIX pendente. Escaneie o QR Code abaixo para pagar.';
              paymentInfo = payment.pixKey
                ? '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:20px;text-align:center;margin:16px 0;">' +
                  (payment.pixQrCode ? '<img src="data:image/png;base64,' + payment.pixQrCode + '" style="width:200px;height:200px;margin:0 auto 16px;" alt="QR Code PIX">' : '') +
                  '<p style="font-size:0.82rem;color:#64748b;margin-bottom:6px;">Codigo PIX (copia e cola):</p>' +
                  '<code style="display:block;background:#ffffff;border:1px solid #e2e8f0;border-radius:4px;padding:10px;font-size:0.78rem;word-break:break-all;">' + payment.pixKey + '</code>' +
                  '<button type="button" class="btn btn-sm btn-outline" style="margin-top:10px;" data-pix-copy="' + encodeURIComponent(payment.pixKey) + '" onclick="window.copyPixFromBtn(this)">Copiar codigo</button>' +
                  '</div>'
                : '<p style="color:#64748b;font-size:0.85rem;">PIX gerado, mas o codigo ainda nao chegou. Atualize a pagina ou veja o pedido no perfil.</p>';
              break;
            case 'BOLETO':
              statusMsg = 'Boleto gerado com sucesso!';
              paymentInfo = payment.boletoUrl
                ? '<div style="margin:16px 0;"><a href="' + payment.boletoUrl + '" target="_blank" class="btn btn-primary">Baixar Boleto</a>' +
                  (payment.barCode ? '<p style="margin-top:8px;font-size:0.82rem;color:#64748b;">Codigo de barras: <code style="display:block;background:#f1f5f9;padding:8px;border-radius:4px;margin-top:4px;font-size:0.78rem;">' + payment.barCode + '</code></p>' : '') +
                  '</div>'
                : '';
              break;
            case 'CREDIT_CARD':
              statusMsg = 'Pagamento processado com sucesso!';
              break;
            default:
              statusMsg = 'Pedido criado com sucesso!';
          }
        }

        var iconColor = paymentFailed ? '#f59e0b' : '#16a34a';
        var title = paymentFailed ? 'Pedido recebido com pagamento pendente' : 'Pedido recebido com sucesso!';

        container.innerHTML =
          '<div class="success-card">' +
          '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="' + iconColor + '" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
          '<h2>' + title + '</h2>' +
          '<p>Nossa equipe vai confirmar os detalhes e entrar em contato, se necessario.</p>' +
          '<div class="review-box" style="margin:18px auto;text-align:left;max-width:560px;">Pedido <strong>#' + escHtml(order.order_number) + '</strong><br>Total: <strong>' + formatPrice(order.total_amount || checkoutTotal()) + '</strong><br>' + statusMsg + '</div>' +
          paymentInfo +
          '<div class="state-actions">' +
          '<a href="perfil.html" class="btn btn-outline">Acompanhar pedido</a>' +
          '<a href="produtos.html" class="btn btn-primary">Continuar comprando</a>' +
          '</div>' +
          '</div>';
      }

      function showCheckoutFailure(error, total) {
        var container = document.getElementById('checkoutContent');
        void error;
        void total;
        showToast('Nao foi possivel finalizar seu pedido agora.', 'error');
        var previous = document.getElementById('checkoutFailure');
        if (previous) previous.remove();
        container.insertAdjacentHTML('afterbegin',
          '<div class="failure-card" id="checkoutFailure">' +
          '<svg width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v5"/><path d="M12 17h.01"/></svg>' +
          '<h2>Nao foi possivel finalizar seu pedido</h2>' +
          '<p>Tente novamente em instantes ou volte ao carrinho para revisar os itens.</p>' +
          '<div class="state-actions"><button class="btn btn-primary" onclick="document.getElementById(&quot;checkoutFailure&quot;)?.remove()">Tentar novamente</button><a href="carrinho.html" class="btn btn-outline">Voltar ao carrinho</a></div>' +
          '</div>'
        );
      }

      window.toggleSummary = function() {
        var card = document.getElementById('orderSummaryCard');
        if (card) card.classList.toggle('is-collapsed');
      };

      window.goToProfileAddresses = function() {
        if (typeof siteNavigate === 'function') siteNavigate('perfil.html#section-enderecos');
        else window.location.href = 'perfil.html#section-enderecos';
      };

      window.copyPixFromBtn = function(btn) {
        var enc = btn && btn.getAttribute('data-pix-copy');
        if (!enc) return;
        try {
          copyToClipboard(decodeURIComponent(enc), 'Codigo PIX copiado');
        } catch (e) {
          copyToClipboard(enc, 'Codigo PIX copiado');
        }
      };

      window.copyToClipboard = function(text, msg) {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function() { showToast(msg || 'Copiado', 'success'); });
        } else {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast(msg || 'Copiado', 'success');
        }
      };

    })();
  </script>
</body>
</html>
