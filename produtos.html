<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Confira todos os colchoes Conforta com entrega rapida e 12x sem juros.">
  <title>Todos os Produtos - Conforta Colchoes</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #1e293b; background: #0f172a; line-height: 1.6; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input { font-family: inherit; border: none; outline: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    .header { position: fixed; top: 0; left: 0; right: 0; background: #0f172a; border-bottom: 1px solid #1e293b; z-index: 1000; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 20px; }
    .logo { display: flex; align-items: center; gap: 8px; color: #ffffff; }
    .logo img { height: 36px; width: auto; display: block; }
    .search-bar { flex: 1; max-width: 480px; display: flex; align-items: center; background: #1e293b; border-radius: 6px; overflow: hidden; border: 1px solid transparent; transition: border-color 0.2s; }
    .search-bar:focus-within { border-color: #1a56db; background: #1e293b; }
    .search-bar input { flex: 1; padding: 10px 16px; background: transparent; font-size: 0.9rem; color: #e2e8f0; }
    .search-bar input::placeholder { color: #64748b; }
    .search-bar button { padding: 10px 16px; background: transparent; display: flex; align-items: center; justify-content: center; color: #64748b; transition: color 0.2s; }
    .search-bar button:hover { color: #ffffff; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .header-actions button { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #cbd5e1; transition: background 0.2s, color 0.2s; }
    .header-actions button:hover { background: rgba(255,255,255,0.08); color: #ffffff; }
    .header-actions a { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #cbd5e1; transition: background 0.2s, color 0.2s; }
    .header-actions a:hover { background: rgba(255,255,255,0.08); color: #ffffff; }
    .cart-count { position: absolute; top: 2px; right: 2px; background: #dc2626; color: #ffffff; font-size: 0.65rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; display: none; }
    .cart-count.visible { display: flex; }
    .mobile-menu-btn { display: none; }
    .mobile-menu { display: none; position: fixed; top: 56px; left: 0; right: 0; background: #0f172a; border-bottom: 1px solid #1e293b; padding: 12px 20px; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .mobile-menu.open { display: block; }
    .mobile-menu a { display: block; padding: 10px 0; font-size: 0.95rem; font-weight: 500; color: #cbd5e1; border-bottom: 1px solid #1e293b; }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: #ffffff; }
    .main { margin-top: 56px; min-height: calc(100vh - 56px); background: #ffffff; }

    .breadcrumb { display: flex; align-items: center; gap: 8px; padding: 16px 0; font-size: 0.85rem; color: #94a3b8; flex-wrap: wrap; }
    .breadcrumb a { color: #64748b; transition: color 0.2s; }
    .breadcrumb a:hover { color: #1a56db; }
    .breadcrumb span { color: #1e293b; font-weight: 500; }
    .breadcrumb-sep { color: #cbd5e1; }

    .page-header { padding: 24px 0 16px; border-bottom: 1px solid #f1f5f9; }
    .page-header h1 { font-size: 1.75rem; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
    .page-header p { font-size: 0.95rem; color: #64748b; margin-top: 4px; }

    .filter-bar { position: sticky; top: 56px; z-index: 100; background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 10px 0; }
    .filter-bar-inner { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .filter-toggle { display: none; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.85rem; font-weight: 600; color: #334155; background: #ffffff; transition: all 0.2s; }
    .filter-toggle:hover { border-color: #1a56db; color: #1a56db; }
    .filter-toggle.active { background: #eff6ff; border-color: #1a56db; color: #1a56db; }

    .sort-select { padding: 8px 36px 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.85rem; color: #334155; background: #ffffff; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; transition: border-color 0.2s; }
    .sort-select:focus { border-color: #1a56db; outline: none; }
    .results-count { font-size: 0.85rem; color: #94a3b8; margin-left: auto; }

    .filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; width: 100%; margin-top: 8px; }
    .filter-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; font-size: 0.8rem; color: #1a56db; font-weight: 500; }
    .filter-chip button { display: flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; color: #1a56db; transition: background 0.2s; }
    .filter-chip button:hover { background: rgba(26,86,219,0.1); }

    .products-layout { display: flex; gap: 28px; padding: 24px 0 48px; align-items: flex-start; }

    .filter-sidebar { width: 240px; flex-shrink: 0; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 20px; }
    .filter-sidebar h3 { font-size: 0.9rem; font-weight: 700; color: #0f172a; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
    .filter-section { margin-bottom: 20px; }
    .filter-section:last-child { margin-bottom: 0; }
    .filter-section h4 { font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .filter-cat-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; font-size: 0.88rem; color: #334155; transition: color 0.2s; }
    .filter-cat-item:hover { color: #1a56db; }
    .filter-cat-item input { width: 16px; height: 16px; accent-color: #1a56db; cursor: pointer; flex-shrink: 0; }
    .filter-cat-item label { cursor: pointer; flex: 1; }
    .filter-cat-item .cat-count { font-size: 0.75rem; color: #94a3b8; }

    .price-inputs { display: flex; align-items: center; gap: 8px; }
    .price-inputs input { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.85rem; color: #1e293b; transition: border-color 0.2s; }
    .price-inputs input:focus { border-color: #1a56db; }
    .price-inputs span { color: #94a3b8; font-size: 0.85rem; }

    .filter-checkbox { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; font-size: 0.88rem; color: #334155; }
    .filter-checkbox input { width: 16px; height: 16px; accent-color: #1a56db; cursor: pointer; flex-shrink: 0; }
    .filter-checkbox label { cursor: pointer; }

    .color-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .color-option { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e2e8f0; cursor: pointer; transition: border-color 0.2s, transform 0.2s; position: relative; }
    .color-option:hover { transform: scale(1.1); }
    .color-option.active { border-color: #1a56db; box-shadow: 0 0 0 2px #ffffff, 0 0 0 4px #1a56db; }
    .color-option .color-tooltip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #1e293b; color: #ffffff; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
    .color-option:hover .color-tooltip { display: block; }

    .filter-apply { display: none; width: 100%; padding: 10px; background: #1a56db; color: #ffffff; border-radius: 6px; font-weight: 600; font-size: 0.85rem; margin-top: 12px; transition: background 0.2s; }
    .filter-apply:hover { background: #0f3a8e; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 998; }

    .products-content { flex: 1; min-width: 0; }
    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .product-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; position: relative; cursor: pointer; }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .product-card .product-image { position: relative; width: 100%; padding-top: 100%; background: #f1f5f9; overflow: hidden; }
    .product-card .product-image img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .product-card:hover .product-image img { transform: scale(1.06); }
    .product-card .product-image .placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
    .product-card .product-badge { position: absolute; top: 8px; left: 8px; background: #dc2626; color: #ffffff; font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; z-index: 1; }
    .product-card .product-flash-badge { position: absolute; top: 8px; right: 8px; background: #f59e0b; color: #1e293b; font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; z-index: 1; text-align: center; }
    .product-card .product-flash-badge .flash-timer { font-size: 0.65rem; font-weight: 400; display: block; margin-top: 1px; }
    .product-card .product-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .product-card .product-category { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #1a56db; }
    .product-card .product-name { font-size: 0.88rem; font-weight: 600; color: #0f172a; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
    .product-card .product-old-price { font-size: 0.8rem; color: #94a3b8; text-decoration: line-through; }
    .product-card .product-price-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .product-card .product-price { font-size: 1.2rem; font-weight: 700; color: #0f172a; }
    .product-card .product-installment { font-size: 0.75rem; color: #16a34a; font-weight: 500; }
    .product-card .btn-add-cart { margin-top: 8px; width: 100%; padding: 10px; background: #1a56db; color: #ffffff; border-radius: 6px; font-weight: 600; font-size: 0.82rem; transition: background 0.2s; }
    .product-card .btn-add-cart:hover { background: #0f3a8e; }

    .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; }
    .empty-state svg { margin: 0 auto 16px; color: #cbd5e1; display: block; }
    .empty-state h3 { font-size: 1.1rem; color: #334155; margin-bottom: 8px; }
    .empty-state p { font-size: 0.88rem; color: #94a3b8; }

    .loading-spinner { grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: #94a3b8; gap: 8px; font-size: 0.9rem; }
    .loading-spinner::before { content: ''; width: 22px; height: 22px; border: 2.5px solid #e2e8f0; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .load-more-wrap { text-align: center; padding: 32px 0 8px; }
    .load-more-btn { padding: 12px 40px; background: #ffffff; border: 1.5px solid #1a56db; color: #1a56db; border-radius: 6px; font-weight: 600; font-size: 0.88rem; transition: all 0.2s; }
    .load-more-btn:hover { background: #1a56db; color: #ffffff; }
    .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #cbd5e1; color: #94a3b8; background: #ffffff; }
    .load-more-btn.loading { opacity: 0.7; cursor: wait; }

    .footer { background: #0f172a; color: #cbd5e1; padding: 24px 0 18px; margin-top: 24px; }
    .footer-compact { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; }
    .footer-brand-mini { display: inline-flex; align-items: center; }
    .footer-brand-mini img { height: 34px; width: auto; display: block; }
    .footer-contacts { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .footer-contact-item { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #cbd5e1; transition: color 0.2s; }
    a.footer-contact-item:hover { color: #fff; }
    .footer-contact-item svg { flex-shrink: 0; color: #94a3b8; }
    .footer-bottom-mini { font-size: 0.75rem; color: #64748b; padding-top: 12px; border-top: 1px solid #1e293b; width: 100%; }

    @media (max-width: 1024px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .search-bar { display: none; }
      .mobile-menu-btn { display: flex; }
      .page-header h1 { font-size: 1.25rem; }
      .filter-bar { top: 56px; padding: 8px 0; }
      .filter-toggle { display: flex; }
      .results-count { display: none; }
      .filter-sidebar { position: fixed; top: 56px; left: 0; bottom: 0; width: 300px; z-index: 999; border-radius: 0; border: none; overflow-y: auto; padding: 20px; transform: translateX(-100%); transition: transform 0.3s ease; box-shadow: 4px 0 24px rgba(0,0,0,0.1); }
      .filter-sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .filter-apply { display: block; }
      .products-layout { gap: 0; padding: 14px 0 24px; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .product-card .product-body { padding: 10px; }
      .product-card .product-name { font-size: 0.82rem; }
      .product-card .product-price { font-size: 1.05rem; }
      .product-card .btn-add-cart { padding: 8px; font-size: 0.78rem; }
      .footer { padding: 18px 0 14px; }
      .footer-contacts { gap: 10px; flex-direction: column; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 12px; }
      .header-inner { gap: 8px; height: 52px; }
      .main { margin-top: 52px; }
      .mobile-menu { top: 52px; }
      .filter-bar { top: 52px; }
      .filter-sidebar { top: 52px; }
      .logo img { height: 28px; }
      .logo .logo-text { display: none; }
      .header-actions button, .header-actions a { width: 36px; height: 36px; }
      .product-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .page-header { padding: 14px 0 10px; }
      .page-header h1 { font-size: 1.05rem; }
      .breadcrumb { font-size: 0.74rem; padding: 8px 0; }
      .filter-bar-inner { gap: 6px; }
      .sort-select { font-size: 0.74rem; padding: 5px 28px 5px 8px; }
      .filter-toggle { padding: 6px 10px; font-size: 0.78rem; }
      .product-card .product-name { font-size: 0.76rem; }
      .product-card .product-price { font-size: 0.92rem; }
      .product-card .product-installment { font-size: 0.68rem; }
      .product-card .btn-add-cart { padding: 7px; font-size: 0.72rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Conforta Colchoes">
        <img src="assets/logo.png" alt="">
        <span class="logo-text">Conforta<small>COLCHOES</small></span>
      </a>
      <form class="search-bar" id="searchForm" action="produtos.html" method="GET">
        <input type="text" name="search" placeholder="Buscar produtos..." aria-label="Buscar produtos" id="searchInput">
        <button type="submit" aria-label="Buscar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </form>
      <div class="header-actions">
        <button id="cartBtn" aria-label="Carrinho">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="21" r="1"/><circle cx="21" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
        <a href="perfil.html" id="authBtn" aria-label="Perfil">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
        <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Menu">
          <svg id="menuIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
          </svg>
          <svg id="closeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">Inicio</a>
      <a href="produtos.html">Produtos</a>
      <a href="perfil.html">Meu Perfil</a>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div class="container">
        <nav class="breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb-sep">&gt;</span>
          <span id="breadcrumbCurrent">Produtos</span>
        </nav>
        <h1 id="pageTitle">Todos os Produtos</h1>
        <p id="pageSubtitle" style="display:none;"></p>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <div class="container filter-bar-inner">
        <button class="filter-toggle" id="filterToggle" aria-label="Filtrar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/>
          </svg>
          Filtros
        </button>
        <select class="sort-select" id="sortSelect" aria-label="Ordenar por">
          <option value="relevance">Mais relevantes</option>
          <option value="price_asc">Menor preco</option>
          <option value="price_desc">Maior preco</option>
          <option value="discount">Descontos</option>
        </select>
        <span class="results-count" id="resultsCount"></span>
        <div class="filter-chips" id="filterChips"></div>
      </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container products-layout">
      <aside class="filter-sidebar" id="filterSidebar">
        <div class="filter-section">
          <h4>Categorias</h4>
          <div id="categoriesList">
            <div class="loading-spinner" style="padding:12px 0;justify-content:flex-start;font-size:0.82rem;">Carregando...</div>
          </div>
        </div>
        <div class="filter-section">
          <h4>Preco</h4>
          <div class="price-inputs">
            <input type="number" id="minPrice" placeholder="Min" min="0" step="1" aria-label="Preco minimo">
            <span>ate</span>
            <input type="number" id="maxPrice" placeholder="Max" min="0" step="1" aria-label="Preco maximo">
          </div>
        </div>
        <div class="filter-section">
          <label class="filter-checkbox">
            <input type="checkbox" id="onlyOffers">
            <label for="onlyOffers">So ofertas</label>
          </label>
        </div>
        <div class="filter-section" id="colorSection" style="display:none;">
          <h4>Cores</h4>
          <div class="color-options" id="colorOptions"></div>
        </div>
        <button class="filter-apply" id="filterApply">Aplicar filtros</button>
      </aside>

      <div class="products-content">
        <div class="product-grid" id="productGrid">
          <div class="loading-spinner">Carregando produtos...</div>
        </div>
        <div class="load-more-wrap" id="loadMoreWrap">
          <button class="load-more-btn" id="loadMoreBtn">Carregar mais produtos</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="siteFooter"></footer>

  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    (function() {
      'use strict';

      var sb = null;
      var state = {
        page: 0,
        pageSize: 12,
        total: 0,
        products: [],
        hasMore: true,
        loading: false,
        loadingMore: false,
        categories: [],
        colors: [],
        activeCategoryId: null,
        activeCategoryName: '',
        filters: {
          search: '',
          minPrice: '',
          maxPrice: '',
          onlyOffers: false,
          color: ''
        },
        sort: 'relevance'
      };

      var countdownIntervals = [];

      function getUrlParams() {
        var params = new URLSearchParams(window.location.search);
        state.filters.search = params.get('search') || '';
        state.filters.minPrice = params.get('min_price') || '';
        state.filters.maxPrice = params.get('max_price') || '';
        state.filters.onlyOffers = params.get('so_ofertas') === 'true';
        state.filters.color = params.get('cor') || '';
        state.sort = params.get('sort') || 'relevance';
        state.activeCategoryId = params.get('categoria') || null;
      }

      function updateUrl() {
        var params = new URLSearchParams();
        if (state.filters.search) params.set('search', state.filters.search);
        if (state.activeCategoryId) params.set('categoria', state.activeCategoryId);
        if (state.filters.minPrice) params.set('min_price', state.filters.minPrice);
        if (state.filters.maxPrice) params.set('max_price', state.filters.maxPrice);
        if (state.filters.onlyOffers) params.set('so_ofertas', 'true');
        if (state.filters.color) params.set('cor', state.filters.color);
        if (state.sort && state.sort !== 'relevance') params.set('sort', state.sort);
        var qs = params.toString();
        var newUrl = window.location.pathname + (qs ? '?' + qs : '');
        window.history.replaceState({}, '', newUrl);
      }

      async function loadCategories() {
        try {
          sb = getSupabase();
          if (!sb) {
            document.getElementById('categoriesList').innerHTML = '';
            return;
          }
          var resp = await sb.from('categories').select('id, name, slug').eq('active', true).order('sort_order', { ascending: true }).order('name', { ascending: true });
          var data = resp.data;
          var error = resp.error;
          if (error || !data) {
            document.getElementById('categoriesList').innerHTML = '';
            return;
          }
          state.categories = data;
          renderCategories();
        } catch (e) {
          document.getElementById('categoriesList').innerHTML = '';
        }
      }

      function renderCategories() {
        var list = document.getElementById('categoriesList');
        if (!state.categories.length) {
          list.innerHTML = '<p style="font-size:0.82rem;color:#94a3b8;">Nenhuma categoria</p>';
          return;
        }
        var html = '<label class="filter-cat-item"><input type="radio" name="categoria" value="" ' + (!state.activeCategoryId ? 'checked' : '') + '><label>Todas as categorias</label></label>';
        html += state.categories.map(function(c) {
          var checked = c.id === state.activeCategoryId || c.slug === state.activeCategoryId ? 'checked' : '';
          return '<label class="filter-cat-item"><input type="radio" name="categoria" value="' + c.id + '" ' + checked + '><label>' + c.name + '</label></label>';
        }).join('');
        list.innerHTML = html;

        list.querySelectorAll('input[type="radio"]').forEach(function(input) {
          input.addEventListener('change', function() {
            if (this.checked) {
              state.activeCategoryId = this.value || null;
              if (this.value) {
                var cat = state.categories.find(function(c) { return c.id === this.value; }.bind(this));
                state.activeCategoryName = cat ? cat.name : '';
              } else {
                state.activeCategoryName = '';
              }
              applyFilters();
            }
          });
        });
      }

      async function loadColors() {
        try {
          sb = getSupabase();
          if (!sb) return;
          var resp = await sb.from('product_photos').select('color_name, color_hex').not('color_name', 'is', null).not('color_hex', 'is', null).eq('active', true);
          var data = resp.data;
          if (!data || data.length === 0) return;
          var seen = {};
          state.colors = [];
          data.forEach(function(p) {
            var key = p.color_name + '|' + p.color_hex;
            if (!seen[key]) {
              seen[key] = true;
              state.colors.push({ name: p.color_name, hex: p.color_hex });
            }
          });
          renderColors();
        } catch (e) {
          // no colors
        }
      }

      function renderColors() {
        if (!state.colors.length) return;
        var section = document.getElementById('colorSection');
        var options = document.getElementById('colorOptions');
        section.style.display = 'block';
        options.innerHTML = state.colors.map(function(c) {
          var active = state.filters.color === c.name ? ' active' : '';
          return '<div class="color-option' + active + '" data-color="' + c.name + '" style="background:' + c.hex + '" title="' + c.name + '"><span class="color-tooltip">' + c.name + '</span></div>';
        }).join('');
        options.querySelectorAll('.color-option').forEach(function(el) {
          el.addEventListener('click', function() {
            var color = this.getAttribute('data-color');
            if (state.filters.color === color) {
              state.filters.color = '';
              this.classList.remove('active');
            } else {
              options.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('active'); });
              state.filters.color = color;
              this.classList.add('active');
            }
            applyFilters();
          });
        });
      }

      async function loadProducts(append) {
        if (state.loading) return;
        state.loading = true;

        if (!append) {
          state.page = 0;
          state.products = [];
          document.getElementById('productGrid').innerHTML = '<div class="loading-spinner">Carregando produtos...</div>';
          document.getElementById('loadMoreBtn').style.display = 'none';
        } else {
          state.loadingMore = true;
          document.getElementById('loadMoreBtn').classList.add('loading');
          document.getElementById('loadMoreBtn').disabled = true;
        }

        try {
          sb = getSupabase();
          if (!sb) {
            renderFallbackProducts(append);
            return;
          }

          var query = sb.from('products').select('*, product_photos(*)', { count: 'exact' }).eq('active', true);

          if (state.activeCategoryId) {
            var uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            if (uuidRegex.test(state.activeCategoryId)) {
              query = query.eq('category_id', state.activeCategoryId);
            } else {
              query = query.eq('category_id', state.activeCategoryId);
            }
          }

          if (state.filters.search) {
            query = query.ilike('name', '%' + state.filters.search + '%');
          }

          if (state.filters.onlyOffers) {
            query = query.not('discount_price', 'is', null);
          }

          if (state.filters.minPrice) {
            query = query.gte('base_price', parseFloat(state.filters.minPrice));
          }
          if (state.filters.maxPrice) {
            query = query.lte('base_price', parseFloat(state.filters.maxPrice));
          }

          if (state.filters.color) {
            var photoResp = await sb.from('product_photos').select('product_id').eq('color_name', state.filters.color).eq('active', true).not('product_id', 'is', null);
            if (photoResp.data && photoResp.data.length > 0) {
              var ids = [];
              var seenIds = {};
              photoResp.data.forEach(function(p) {
                if (!seenIds[p.product_id]) {
                  seenIds[p.product_id] = true;
                  ids.push(p.product_id);
                }
              });
              if (ids.length > 0) {
                query = query.in('id', ids);
              } else {
                query = query.in('id', ['00000000-0000-0000-0000-000000000000']);
              }
            } else {
              query = query.in('id', ['00000000-0000-0000-0000-000000000000']);
            }
          }

          switch (state.sort) {
            case 'price_asc':
              query = query.order('base_price', { ascending: true });
              break;
            case 'price_desc':
              query = query.order('base_price', { ascending: false });
              break;
            case 'discount':
              query = query.not('discount_price', 'is', null);
              query = query.order('discount_price', { ascending: true });
              break;
            default:
              query = query.order('featured', { ascending: false });
              query = query.order('created_at', { ascending: false });
          }

          var from = state.page * state.pageSize;
          var to = from + state.pageSize - 1;
          query = query.range(from, to);

          var resp = await query;
          var data = resp.data;
          var count = resp.count;
          var error = resp.error;

          if (error) {
            renderFallbackProducts(append);
            return;
          }

          state.total = count || 0;
          state.hasMore = data && data.length === state.pageSize;

          if (append) {
            state.products = state.products.concat(data || []);
            renderProducts(data, true);
          } else {
            state.products = data || [];
            renderProducts(state.products, false);
          }

          updateResultsCount();
          updateUrl();
          updateFilterChips();

        } catch (e) {
          renderFallbackProducts(append);
        } finally {
          state.loading = false;
          state.loadingMore = false;
          document.getElementById('loadMoreBtn').classList.remove('loading');
          document.getElementById('loadMoreBtn').disabled = !state.hasMore;
          document.getElementById('loadMoreBtn').style.display = state.hasMore ? 'inline-block' : 'none';
        }
      }

      function renderProducts(products, append) {
        var grid = document.getElementById('productGrid');

        if (!products || products.length === 0) {
          if (!append) {
            grid.innerHTML =
              '<div class="empty-state">' +
              '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>' +
              '<h3>Nenhum produto encontrado</h3>' +
              '<p>Tente ajustar os filtros ou buscar por outros termos.</p>' +
              '</div>';
          }
          return;
        }

        var html = '';
        products.forEach(function(p) {
          html += renderProductCard(p);
        });

        if (append) {
          grid.insertAdjacentHTML('beforeend', html);
        } else {
          grid.innerHTML = html;
        }

        startFlashCountdowns();
      }

      function renderProductCard(p) {
        var photo = p.product_photos && p.product_photos.length > 0 ? p.product_photos[0] : null;
        var imgHtml = '';
        if (photo && photo.url) {
          imgHtml = '<img src="' + photo.url + '" alt="' + escHtml(p.name) + '" loading="lazy">';
        } else {
          imgHtml = '<div class="placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>';
        }

        var catName = '';
        if (state.categories && state.categories.length > 0) {
          var cat = state.categories.find(function(c) { return c.id === p.category_id; });
          catName = cat ? cat.name : '';
        }

        var basePrice = parseFloat(p.base_price) || 0;
        var salePrice = p.discount_price ? parseFloat(p.discount_price) : null;
        var hasDiscount = salePrice !== null && salePrice < basePrice;
        var displayPrice = hasDiscount ? salePrice : basePrice;

        var installments = calcInstallments(displayPrice, 12, 20);
        var installmentHtml = '';
        if (installments && installments.length > 0) {
          var best = installments[installments.length - 1];
          installmentHtml = '<span class="product-installment">' + best.qtd + 'x de ' + formatPrice(best.valor) + ' sem juros</span>';
        }

        var flashHtml = '';
        var flashId = 'flash_' + (p.id || Math.random().toString(36).slice(2));
        if (p.flash_offer_ends) {
          var endDate = new Date(p.flash_offer_ends);
          if (endDate > new Date()) {
            flashHtml = '<div class="product-flash-badge">Flash<span class="flash-timer" id="' + flashId + '"></span></div>';
          }
        }

        var badgeHtml = '';
        if (hasDiscount) {
          var pct = Math.round((1 - salePrice / basePrice) * 100);
          badgeHtml = '<div class="product-badge">-' + pct + '%</div>';
        }

        var href = 'produto.html?id=' + encodeURIComponent(p.id);
        return '<div class="product-card" data-id="' + p.id + '" onclick="if(event.target.closest(\'.btn-add-cart\'))return;window.location.href=\'' + href + '\';">' +
          '<a href="' + href + '" class="product-image" onclick="event.stopPropagation()">' +
          imgHtml +
          badgeHtml +
          flashHtml +
          '</a>' +
          '<div class="product-body">' +
          (catName ? '<span class="product-category">' + catName + '</span>' : '') +
          '<a href="' + href + '" style="color:inherit;text-decoration:none;flex:1;" onclick="event.stopPropagation()"><h3 class="product-name">' + escHtml(p.name) + '</h3></a>' +
          (hasDiscount ? '<span class="product-old-price">' + formatPrice(basePrice) + '</span>' : '') +
          '<div class="product-price-row">' +
          '<span class="product-price">' + formatPrice(displayPrice) + '</span>' +
          '</div>' +
          installmentHtml +
          '<button class="btn-add-cart" onclick="event.stopPropagation();handleAddToCart(\'' + p.id + '\', ' + displayPrice + ')">Adicionar ao carrinho</button>' +
          '</div></div>';
      }

      function startFlashCountdowns() {
        countdownIntervals.forEach(function(interval) { clearInterval(interval); });
        countdownIntervals = [];

        state.products.forEach(function(p) {
          if (!p.flash_offer_ends) return;
          var endDate = new Date(p.flash_offer_ends);
          if (isNaN(endDate.getTime()) || endDate <= new Date()) return;
          var flashId = 'flash_' + (p.id || '');
          var el = document.getElementById(flashId);
          if (!el) return;
          var interval = startCountdown(el, p.flash_offer_ends);
          if (interval) countdownIntervals.push(interval);
        });
      }

      function renderFallbackProducts(append) {
        if (append || state.products.length > 0) return;

        var fallback = [
          { id: 'fb-1', name: 'Colchao King Size Conforta', category_id: null, base_price: 4999.00, discount_price: 3999.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-2', name: 'Sofa 3 Lugares Conforta Premium', category_id: null, base_price: 3899.00, discount_price: 3299.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-3', name: 'Box Bau Casal Conforta', category_id: null, base_price: 2199.00, discount_price: 1799.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-4', name: 'Cabeceira Estofada King', category_id: null, base_price: 1299.00, discount_price: 999.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-5', name: 'Kit Colchao Casal + Box Bau', category_id: null, base_price: 3999.00, discount_price: 3499.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-6', name: 'Colchao Solteiro Conforta', category_id: null, base_price: 1599.00, discount_price: 1299.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-7', name: 'Sofa 2 Lugares Retratil', category_id: null, base_price: 2899.00, discount_price: 2499.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-8', name: 'Colchao Queen Size Ortopedico', category_id: null, base_price: 3299.00, discount_price: 2799.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-9', name: 'Mesa de Jantar 6 Lugares', category_id: null, base_price: 2199.00, discount_price: null, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-10', name: 'Estante Modular 4 Prateleiras', category_id: null, base_price: 899.00, discount_price: 699.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-11', name: 'Poltrona Reclinavel Premium', category_id: null, base_price: 2499.00, discount_price: 1999.00, flash_offer_ends: null, product_photos: [] },
          { id: 'fb-12', name: 'Guarda Roupa Casal 6 Portas', category_id: null, base_price: 3299.00, discount_price: null, flash_offer_ends: null, product_photos: [] }
        ];

        state.total = fallback.length;
        state.hasMore = false;
        state.products = fallback;
        renderProducts(fallback, false);
        updateResultsCount();
        document.getElementById('loadMoreBtn').style.display = 'none';
      }

      function updateResultsCount() {
        var el = document.getElementById('resultsCount');
        if (state.total > 0) {
          el.textContent = state.total + (state.total === 1 ? ' produto' : ' produtos') + ' encontrados';
        } else {
          el.textContent = '';
        }
      }

      function updateFilterChips() {
        var container = document.getElementById('filterChips');
        var chips = [];

        if (state.activeCategoryName) {
          chips.push({ label: state.activeCategoryName, action: 'categoria' });
        }
        if (state.filters.search) {
          chips.push({ label: 'Busca: "' + state.filters.search + '"', action: 'search' });
        }
        if (state.filters.onlyOffers) {
          chips.push({ label: 'So ofertas', action: 'offers' });
        }
        if (state.filters.minPrice || state.filters.maxPrice) {
          chips.push({ label: 'R$ ' + (state.filters.minPrice || '0') + ' - R$ ' + (state.filters.maxPrice || '...'), action: 'price' });
        }
        if (state.filters.color) {
          chips.push({ label: 'Cor: ' + state.filters.color, action: 'color' });
        }

        if (chips.length === 0) {
          container.innerHTML = '';
          return;
        }

        container.innerHTML = chips.map(function(chip) {
          return '<span class="filter-chip">' + chip.label + '<button data-action="' + chip.action + '" aria-label="Remover filtro"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></span>';
        }).join('');

        container.querySelectorAll('[data-action]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var action = this.getAttribute('data-action');
            switch (action) {
              case 'categoria':
                state.activeCategoryId = null;
                state.activeCategoryName = '';
                break;
              case 'search':
                state.filters.search = '';
                break;
              case 'offers':
                state.filters.onlyOffers = false;
                break;
              case 'price':
                state.filters.minPrice = '';
                state.filters.maxPrice = '';
                break;
              case 'color':
                state.filters.color = '';
                document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('active'); });
                break;
            }
            syncFilterUI();
            applyFilters();
          });
        });
      }

      function syncFilterUI() {
        document.getElementById('onlyOffers').checked = state.filters.onlyOffers;
        document.getElementById('minPrice').value = state.filters.minPrice;
        document.getElementById('maxPrice').value = state.filters.maxPrice;
        if (state.filters.search) {
          document.getElementById('searchInput').value = state.filters.search;
        }
        renderCategories();
        if (state.filters.color) {
          var colorEls = document.querySelectorAll('.color-option');
          colorEls.forEach(function(el) {
            if (el.getAttribute('data-color') === state.filters.color) {
              el.classList.add('active');
            }
          });
        }
      }

      function applyFilters() {
        state.filters.minPrice = document.getElementById('minPrice').value.trim();
        state.filters.maxPrice = document.getElementById('maxPrice').value.trim();
        state.filters.onlyOffers = document.getElementById('onlyOffers').checked;

        var selectedCat = document.querySelector('input[name="categoria"]:checked');
        if (selectedCat && selectedCat.value) {
          state.activeCategoryId = selectedCat.value;
          var cat = state.categories.find(function(c) { return c.id === selectedCat.value; });
          state.activeCategoryName = cat ? cat.name : '';
        } else if (selectedCat && !selectedCat.value) {
          state.activeCategoryId = null;
          state.activeCategoryName = '';
        }

        updatePageTitle();
        loadProducts(false);
        if (window.innerWidth <= 768) closeFilterSidebar();
      }

      function handleSortChange(value) {
        state.sort = value;
        updateUrl();
        loadProducts(false);
      }

      function updatePageTitle() {
        var titleEl = document.getElementById('pageTitle');
        var subtitleEl = document.getElementById('pageSubtitle');
        var breadcrumbEl = document.getElementById('breadcrumbCurrent');

        if (state.activeCategoryName) {
          titleEl.textContent = state.activeCategoryName;
          breadcrumbEl.textContent = state.activeCategoryName;
        } else if (state.filters.search) {
          titleEl.textContent = 'Resultados para "' + state.filters.search + '"';
          breadcrumbEl.textContent = 'Produtos';
        } else {
          titleEl.textContent = 'Todos os Produtos';
          breadcrumbEl.textContent = 'Produtos';
        }
      }

      function toggleFilterSidebar() {
        var sidebar = document.getElementById('filterSidebar');
        var overlay = document.getElementById('sidebarOverlay');
        var toggle = document.getElementById('filterToggle');
        var isOpen = sidebar.classList.toggle('open');
        overlay.classList.toggle('open', isOpen);
        toggle.classList.toggle('active', isOpen);
        document.body.style.overflow = isOpen ? 'hidden' : '';
      }

      function closeFilterSidebar() {
        document.getElementById('filterSidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
        document.getElementById('filterToggle').classList.remove('active');
        document.body.style.overflow = '';
      }

      function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }

      window.handleAddToCart = async function(productId, price) {
        if (typeof addProductToCart === 'function') {
          await addProductToCart(productId, null, 1, price);
        } else {
          showToast('Carrinho indisponivel', 'error');
        }
      };

      document.addEventListener('DOMContentLoaded', function() {
        if (typeof initSupabase === 'function') initSupabase();
        sb = getSupabase();

        if (typeof renderCompactFooter === 'function') {
          renderCompactFooter('#siteFooter');
        }

        getUrlParams();

        var searchInput = document.getElementById('searchInput');
        if (searchInput && state.filters.search) {
          searchInput.value = state.filters.search;
        }

        document.getElementById('sortSelect').value = state.sort;
        document.getElementById('onlyOffers').checked = state.filters.onlyOffers;
        document.getElementById('minPrice').value = state.filters.minPrice;
        document.getElementById('maxPrice').value = state.filters.maxPrice;

        updatePageTitle();

        loadCategories();
        loadColors();
        loadProducts(false);

        var sortSelect = document.getElementById('sortSelect');
        sortSelect.addEventListener('change', function() {
          handleSortChange(this.value);
        });

        document.getElementById('filterToggle').addEventListener('click', toggleFilterSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeFilterSidebar);
        document.getElementById('filterApply').addEventListener('click', applyFilters);

        document.getElementById('loadMoreBtn').addEventListener('click', function() {
          if (state.loadingMore || !state.hasMore) return;
          state.page++;
          loadProducts(true);
        });

        document.getElementById('searchForm').addEventListener('submit', function(e) {
          var input = this.querySelector('input');
          if (input && input.value.trim()) {
            state.filters.search = input.value.trim();
            state.activeCategoryId = null;
            state.activeCategoryName = '';
            updateUrl();
            loadProducts(false);
          }
          e.preventDefault();
        });

        var cartCountEl = document.getElementById('cartCount');
        var mobileMenu = document.getElementById('mobileMenu');
        var mobileMenuBtn = document.getElementById('mobileMenuBtn');
        var menuIcon = document.getElementById('menuIcon');
        var closeIcon = document.getElementById('closeIcon');

        if (mobileMenuBtn && mobileMenu) {
          mobileMenuBtn.addEventListener('click', function() {
            var isOpen = mobileMenu.classList.toggle('open');
            if (menuIcon) menuIcon.style.display = isOpen ? 'none' : 'block';
            if (closeIcon) closeIcon.style.display = isOpen ? 'block' : 'none';
          });
        }

        document.addEventListener('click', function(e) {
          if (mobileMenu && mobileMenuBtn && !mobileMenu.contains(e.target) && e.target !== mobileMenuBtn && !mobileMenuBtn.contains(e.target)) {
            mobileMenu.classList.remove('open');
            if (menuIcon) menuIcon.style.display = 'block';
            if (closeIcon) closeIcon.style.display = 'none';
          }
        });

        if (typeof updateCartCount === 'function') updateCartCount();
      });
    })();
  </script>
</body>
</html>
