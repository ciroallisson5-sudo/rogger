<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Meu carrinho - Conforta Colchões">
  <title>Carrinho - Conforta Colchões</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #1e293b; background: #f8fafc; line-height: 1.6; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    .container { max-width: 1140px; margin: 0 auto; padding: 0 20px; }
    .main { margin-top: 0; min-height: 100vh; background: #f8fafc; }
    .cc-cart-page { padding: 24px 0 56px; }
    .cc-cart-page h1 { font-size: clamp(1.35rem, 3.5vw, 1.75rem); font-weight: 800; color: #0f172a; letter-spacing: -0.03em; margin-bottom: 6px; }
    .cc-cart-page > .container > p { color: #64748b; font-size: 0.92rem; font-weight: 600; margin-bottom: 22px; }
    .cc-full-cart-loading { text-align: center; padding: 48px 16px; color: #64748b; font-weight: 600; }
    .cc-full-cart-state {
      max-width: 480px; margin: 40px auto; text-align: center; background: #fff; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 36px 28px; box-shadow: 0 8px 28px rgba(15,23,42,0.06);
    }
    .cc-full-cart-state h2 { font-size: 1.2rem; font-weight: 800; color: #0f172a; margin-bottom: 10px; }
    .cc-full-cart-state p { color: #64748b; font-size: 0.92rem; margin-bottom: 22px; }
    .cc-full-cart-actions { display: flex; flex-direction: column; gap: 10px; }
    .cc-full-cart-stack {
      display: grid; grid-template-columns: 1fr; gap: 22px; align-items: start;
    }
    @media (min-width: 920px) {
      .cc-full-cart-stack { grid-template-columns: 1fr 340px; }
    }
    .cc-full-cart-items-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px 18px 8px;
      box-shadow: 0 6px 22px rgba(15,23,42,0.05);
    }
    .cc-full-cart-items-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding-bottom: 14px; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9;
    }
    .cc-full-cart-items-head h2 { font-size: 1.05rem; font-weight: 800; color: #0f172a; }
    .cc-full-cart-items-head span { font-size: 0.78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
    .cc-full-cart-items .cart-item { padding: 16px 0; }
    .cc-full-cart-items .cart-item:last-child { border-bottom: none; }
    .cc-full-cart-summary {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 22px;
      box-shadow: 0 6px 22px rgba(15,23,42,0.05); position: sticky; top: 96px;
    }
    .cc-full-cart-summary h2 { font-size: 1.02rem; font-weight: 800; color: #0f172a; margin-bottom: 16px; }
    .cc-full-cart-lines { display: grid; gap: 10px; font-size: 0.88rem; color: #475569; margin-bottom: 14px; }
    .cc-full-cart-lines > div { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .cc-full-cart-lines strong { color: #0f172a; font-weight: 800; }
    .cc-full-cart-total {
      display: flex; justify-content: space-between; align-items: center; padding-top: 14px;
      margin-top: 6px; border-top: 2px solid #f1f5f9; font-size: 1rem; font-weight: 800; color: #0f172a;
    }
    .cc-full-cart-total strong { font-size: 1.25rem; }
    .cc-full-cart-install { font-size: 0.82rem; color: #16a34a; font-weight: 700; margin-bottom: 14px; }
    .cc-full-cart-delivery {
      font-size: 0.82rem; color: #475569; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 16px; line-height: 1.45;
    }
    .cc-full-cart-delivery strong { display: block; color: #0f172a; margin-bottom: 4px; font-size: 0.86rem; }
    .cc-full-cart-summary .btn-lg { padding: 14px 18px; font-size: 1rem; }
  </style>
</head>
<body>
  <span id="cartCount" class="cart-count" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0" aria-hidden="true">0</span>

  <main class="main">
    <div class="cc-cart-page">
      <div class="container">
        <h1>Meu carrinho</h1>
        <p>Revise os itens e finalize quando estiver pronto.</p>
        <div id="fullCartApp" aria-live="polite"></div>
      </div>
    </div>
  </main>

  <footer class="footer" id="siteFooter"></footer>

  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    (function() {
      'use strict';
      function normalizeWhatsapp(raw) {
        var digits = String(raw || '').replace(/\D/g, '');
        if (!digits) return '';
        return (digits.length === 10 || digits.length === 11) ? '55' + digits : digits;
      }
      async function configureWhatsapp() {
        if (window.CONFORTA_WHATSAPP_URL) return;
        try {
          var phone = '';
          if (typeof getSetting === 'function') phone = await getSetting('whatsapp_number');
          if (!phone && typeof getSetting === 'function') phone = await getSetting('contact_phone');
          var normalized = normalizeWhatsapp(phone);
          if (normalized) window.CONFORTA_WHATSAPP_URL = 'https://wa.me/' + normalized;
        } catch (e) { void e; }
      }
      document.addEventListener('DOMContentLoaded', function() {
        try { if (typeof initSupabase === 'function') initSupabase(); } catch (e) { void e; }
        if (typeof renderCompactFooter === 'function') renderCompactFooter('#siteFooter');
        configureWhatsapp();
        if (typeof updateCartCount === 'function') updateCartCount();
      });
    })();
  </script>
</body>
</html>
