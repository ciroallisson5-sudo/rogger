<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Colchão Conforta — conforto, qualidade e condições especiais. Veja detalhes e leve para casa.">
  <title>Produto - Conforta Colchões</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #1e293b; background: #f8fafc; line-height: 1.6; }
    .main { margin-top: 0; min-height: 100vh; background: #f8fafc; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input { font-family: inherit; border: none; outline: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    .header { position: fixed; top: 0; left: 0; right: 0; background: #0f172a; border-bottom: 1px solid #1e293b; z-index: 1000; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 20px; }
    .logo { display: flex; align-items: center; gap: 8px; color: #ffffff; }
    .logo img { height: 36px; width: auto; display: block; }
    .search-bar { flex: 1; max-width: 480px; display: flex; align-items: center; background: #1e293b; border-radius: 6px; overflow: hidden; border: 1px solid transparent; transition: border-color 0.2s; }
    .search-bar:focus-within { border-color: #1a56db; background: #1e293b; }
    .search-bar input { flex: 1; padding: 10px 16px; background: transparent; font-size: 0.9rem; color: #e2e8f0; }
    .search-bar input::placeholder { color: #64748b; }
    .search-bar button { padding: 10px 16px; background: transparent; display: flex; align-items: center; justify-content: center; color: #64748b; transition: color 0.2s; }
    .search-bar button:hover { color: #ffffff; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .header-actions button { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #cbd5e1; transition: background 0.2s, color 0.2s; }
    .header-actions button:hover { background: rgba(255,255,255,0.08); color: #ffffff; }
    .header-actions a { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #cbd5e1; transition: background 0.2s, color 0.2s; }
    .header-actions a:hover { background: rgba(255,255,255,0.08); color: #ffffff; }
    .cart-count { position: absolute; top: 2px; right: 2px; background: #dc2626; color: #ffffff; font-size: 0.65rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; display: none; }
    .cart-count.visible { display: flex; }
    .mobile-menu-btn { display: none; }
    .mobile-menu { display: none; position: fixed; top: 56px; left: 0; right: 0; background: #0f172a; border-bottom: 1px solid #1e293b; padding: 12px 20px; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .mobile-menu.open { display: block; }
    .mobile-menu a { display: block; padding: 10px 0; font-size: 0.95rem; font-weight: 500; color: #cbd5e1; border-bottom: 1px solid #1e293b; }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: #ffffff; }
    .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: #94a3b8; gap: 8px; font-size: 0.9rem; }
    .loading-spinner::before { content: ''; width: 22px; height: 22px; border: 2.5px solid #e2e8f0; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-inline { display: flex; align-items: center; justify-content: center; padding: 20px; color: #94a3b8; gap: 8px; font-size: 0.85rem; }
    .loading-inline::before { content: ''; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }

    .product-page { padding: 0 0 48px; }

    .product-main { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 48px; align-items: start; }

    .product-gallery { position: sticky; top: 88px; }
    .main-image-wrap { position: relative; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; cursor: crosshair; aspect-ratio: 1 / 1; max-height: 520px; }
    .main-image-wrap:has(video), .main-image-wrap:has(iframe) { cursor: default; background: #000; }
    .main-image-wrap img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.3s ease; }
    .main-image-wrap.zoomed img { transform: scale(2); }
    .main-image-wrap .video-indicator-main { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #ffffff; font-size: 0.75rem; padding: 4px 10px; border-radius: 4px; display: flex; align-items: center; gap: 4px; pointer-events: none; }
    .main-image-wrap .placeholder-img { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; flex-direction: column; gap: 8px; }

    .thumb-gallery { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 4px; scroll-snap-type: x mandatory; }
    .thumb-gallery::-webkit-scrollbar { height: 4px; }
    .thumb-gallery::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    .thumb-gallery::-webkit-scrollbar-track { background: transparent; }
    .thumb-item { flex-shrink: 0; width: 72px; height: 72px; border: 2px solid #e2e8f0; border-radius: 6px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; scroll-snap-align: start; position: relative; background: #f8fafc; }
    .thumb-item:hover { border-color: #94a3b8; }
    .thumb-item.active { border-color: #1a56db; }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-item .video-badge { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: #ffffff; font-size: 0.55rem; padding: 1px 4px; border-radius: 3px; }
    .thumb-item .thumb-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); color: #ffffff; font-size: 0.55rem; text-align: center; padding: 1px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .product-info { min-width: 0; }
    .product-category-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #1a56db; margin-bottom: 6px; display: block; }
    .product-info h1 { font-size: 1.6rem; font-weight: 700; color: #0f172a; line-height: 1.25; margin-bottom: 8px; letter-spacing: -0.3px; }
    .product-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; font-size: 0.85rem; color: #64748b; }
    .product-rating .stars { display: flex; gap: 1px; color: #f59e0b; }
    .product-rating .stars svg { width: 16px; height: 16px; }

    .product-price-section { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
    .price-old { font-size: 1rem; color: #94a3b8; text-decoration: line-through; display: none; }
    .price-old.visible { display: block; }
    .price-current-wrap { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .price-current { font-size: 2rem; font-weight: 800; color: #0f172a; line-height: 1.1; }
    .price-discount-badge { font-size: 0.75rem; font-weight: 700; color: #ffffff; background: #dc2626; padding: 3px 8px; border-radius: 4px; }
    .price-installments { font-size: 0.9rem; color: #16a34a; font-weight: 600; margin-top: 6px; }
    .flash-timer-wrap { display: none; align-items: center; gap: 8px; margin-top: 10px; padding: 8px 12px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; font-size: 0.82rem; color: #dc2626; font-weight: 600; }
    .flash-timer-wrap.visible { display: flex; }
    .flash-timer-wrap .flash-timer { font-family: 'Inter', monospace; background: #dc2626; color: #ffffff; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; letter-spacing: 1px; }

    .product-variants { margin-bottom: 20px; }
    .variant-label { font-size: 0.82rem; font-weight: 600; color: #475569; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .variant-label .variant-value { font-weight: 400; color: #64748b; }
    .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #e2e8f0; cursor: pointer; transition: border-color 0.2s, transform 0.15s; position: relative; flex-shrink: 0; }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: #1a56db; box-shadow: 0 0 0 2px #ffffff, 0 0 0 4px #1a56db; }
    .color-swatch .swatch-tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1e293b; color: #ffffff; font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; white-space: nowrap; z-index: 5; }
    .color-swatch:hover .swatch-tooltip { display: block; }

    .size-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .size-option { padding: 8px 16px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #475569; cursor: pointer; transition: all 0.2s; background: #ffffff; }
    .size-option:hover { border-color: #94a3b8; }
    .size-option.active { border-color: #1a56db; color: #1a56db; background: #eff6ff; }

    .product-qty { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .product-qty label { font-size: 0.82rem; font-weight: 600; color: #475569; }
    .qty-control { display: flex; align-items: center; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; }
    .qty-control button { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #475569; transition: background 0.2s; font-size: 1.1rem; }
    .qty-control button:hover { background: #f1f5f9; }
    .qty-control button:disabled { opacity: 0.3; cursor: not-allowed; }
    .qty-control input { width: 48px; height: 40px; text-align: center; font-size: 0.95rem; font-weight: 600; color: #0f172a; border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; background: #ffffff; }

    .product-actions { display: flex; gap: 12px; margin-bottom: 16px; }
    .product-actions .btn { flex: 1; padding: 14px 24px; font-size: 0.95rem; }
    .btn-primary { background: #1a56db; color: #ffffff; border-radius: 6px; font-weight: 600; transition: background 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { background: #0f3a8e; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; color: #1a56db; border: 1.5px solid #1a56db; border-radius: 6px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-outline:hover { background: #eff6ff; }

    .trust-badges { display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 0; border-top: 1px solid #f1f5f9; }
    .trust-badge { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #64748b; }
    .trust-badge svg { flex-shrink: 0; color: #16a34a; }

    .product-details-tabs { margin-bottom: 48px; }
    .tabs-header { display: flex; gap: 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; }
    .tab-btn { padding: 12px 24px; font-size: 0.9rem; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab-btn:hover { color: #334155; }
    .tab-btn.active { color: #1a56db; border-bottom-color: #1a56db; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .tab-content p { font-size: 0.9rem; color: #475569; line-height: 1.7; }
    .details-table { width: 100%; border-collapse: collapse; }
    .details-table tr { border-bottom: 1px solid #f1f5f9; }
    .details-table td { padding: 10px 16px; font-size: 0.88rem; }
    .details-table td:first-child { font-weight: 600; color: #475569; width: 140px; }
    .details-table td:last-child { color: #0f172a; }

    .similar-products { margin-bottom: 48px; }
    .similar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .similar-header h2 { font-size: 1.25rem; font-weight: 700; color: #0f172a; }
    .similar-header a { font-size: 0.85rem; color: #1a56db; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .similar-header a:hover { text-decoration: underline; }

    .sim-prod-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .sim-prod-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
    .sim-prod-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .sim-prod-card .sim-img { width: 100%; aspect-ratio: 1 / 1; background: #f1f5f9; overflow: hidden; }
    .sim-prod-card .sim-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .sim-prod-card:hover .sim-img img { transform: scale(1.06); }
    .sim-prod-card .sim-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .sim-prod-card .sim-cat { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #1a56db; }
    .sim-prod-card .sim-name { font-size: 0.85rem; font-weight: 600; color: #0f172a; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
    .sim-prod-card .sim-old-price { font-size: 0.78rem; color: #94a3b8; text-decoration: line-through; }
    .sim-prod-card .sim-price-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .sim-prod-card .sim-price { font-size: 1.1rem; font-weight: 700; color: #0f172a; }
    .sim-prod-card .sim-installment { font-size: 0.72rem; color: #16a34a; font-weight: 500; }

    .sim-prod-card .sim-placeholder { width: 100%; aspect-ratio: 1 / 1; background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #cbd5e1; }

    .not-found { text-align: center; padding: 80px 20px; }
    .not-found h2 { font-size: 1.4rem; color: #334155; margin-bottom: 8px; }
    .not-found p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
    .not-found a { color: #1a56db; font-weight: 600; }

    .footer { background: #0f172a; color: #cbd5e1; padding: 24px 0 18px; margin-top: 24px; }
    .footer-compact { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; }
    .footer-brand-mini { display: inline-flex; align-items: center; }
    .footer-brand-mini img { height: 34px; width: auto; display: block; }
    .footer-contacts { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .footer-contact-item { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #cbd5e1; transition: color 0.2s; }
    a.footer-contact-item:hover { color: #fff; }
    .footer-contact-item svg { flex-shrink: 0; color: #94a3b8; }
    .footer-bottom-mini { font-size: 0.75rem; color: #64748b; padding-top: 12px; border-top: 1px solid #1e293b; width: 100%; }

    @media (max-width: 1024px) {
      .product-main { gap: 28px; }
      .sim-prod-grid { grid-template-columns: repeat(3, 1fr); }
      .price-current { font-size: 1.7rem; }
    }

    @media (max-width: 768px) {
      .search-bar { display: none; }
      .mobile-menu-btn { display: none !important; }
      .product-main { grid-template-columns: 1fr; gap: 20px; }
      .product-gallery { position: static; }
      .main-image-wrap { max-height: 320px; }
      .product-info h1 { font-size: 1.15rem; }
      .price-current { font-size: 1.4rem; }
      .product-actions { flex-direction: column; }
      .sim-prod-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .tabs-header { overflow-x: auto; }
      .tab-btn { padding: 9px 14px; font-size: 0.8rem; white-space: nowrap; }
      .footer { padding: 18px 0 14px; }
      .footer-contacts { gap: 10px; flex-direction: column; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 12px; }
      .header-inner { gap: 8px; height: 52px; }
      .main { margin-top: 52px; }
      .mobile-menu { top: 52px; }
      .logo img { height: 28px; }
      .logo .logo-text { display: none; }
      .header-actions button, .header-actions a { width: 36px; height: 36px; }
      .main-image-wrap { max-height: 260px; }
      .thumb-item { width: 50px; height: 50px; }
      .trust-badges { gap: 8px; }
      .trust-badge { font-size: 0.72rem; }
      .sim-prod-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .product-info h1 { font-size: 1rem; }
      .price-current { font-size: 1.2rem; }
    }

    /* Senior ecommerce product page */
    :root {
      --brand: #1a56db;
      --brand-dark: #0f3a8e;
      --brand-soft: #eff6ff;
      --ink: #0f172a;
      --text: #1e293b;
      --muted: #64748b;
      --soft: #f8fafc;
      --line: #e2e8f0;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --radius-xl: 24px;
      --shadow-soft: 0 14px 36px rgba(15,23,42,0.08);
      --shadow-strong: 0 26px 60px rgba(15,23,42,0.14);
    }
    .btn { min-height: 46px; padding: 12px 18px; border-radius: 14px; font-weight: 900; font-size: 0.92rem; transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: var(--brand); color: #fff; border: 1.5px solid var(--brand); box-shadow: 0 14px 26px rgba(26,86,219,0.24); }
    .btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); }
    .btn-outline { background: #fff; color: var(--brand-dark); border: 1.5px solid var(--line); }
    .btn-outline:hover { background: var(--brand-soft); border-color: #bfdbfe; }
    .btn-whatsapp { background: #16a34a; color: #fff; border: 1.5px solid #16a34a; }
    .btn-whatsapp:hover { background: #15803d; border-color: #15803d; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

    .product-top-hero {
      position: relative;
      z-index: 0;
      margin-top: -56px;
      padding-top: calc(56px + 24px);
      padding-bottom: 22px;
      color: #fff;
      background: radial-gradient(circle at top right, rgba(59,130,246,0.35), transparent 28%), linear-gradient(135deg, #0f172a 0%, #0f3a8e 60%, #1a56db 100%);
    }
    .product-top-hero h1 { font-size: clamp(1.75rem, 4vw, 2.8rem); line-height: 1; letter-spacing: -0.055em; margin: 0; max-width: 900px; }
    .product-top-hero p { color: #dbeafe; margin-top: 8px; max-width: 760px; font-weight: 600; }
    .container.product-shell { max-width: 720px; }
    .product-shell { padding: 28px 0 72px; background: #fff; }
    .pdp-back { margin-bottom: 4px; }
    .pdp-back a { font-size: 0.88rem; font-weight: 800; color: var(--brand-dark); }
    .pdp-back a:hover { text-decoration: underline; }
    .pdp-main { display: grid; grid-template-columns: 1fr; gap: 28px; align-items: start; max-width: 720px; margin: 0 auto; }
    .pdp-gallery { position: static; }
    .pdp-main-media { position: relative; overflow: hidden; border-radius: 28px; border: 1px solid var(--line); background: linear-gradient(135deg, #eff6ff, #f8fafc); aspect-ratio: 1 / 0.92; box-shadow: var(--shadow-soft); }
    .pdp-main-media img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.35s ease; }
    .pdp-main-media.zoomable:hover img { transform: scale(1.08); }
    .pdp-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #94a3b8; text-align: center; padding: 24px; }
    .pdp-placeholder strong { color: #475569; font-size: 1rem; }
    .pdp-thumbs { display: flex; gap: 10px; margin-top: 14px; overflow-x: auto; padding-bottom: 4px; }
    .pdp-thumb { width: 82px; height: 82px; flex: 0 0 auto; border-radius: 16px; border: 2px solid var(--line); overflow: hidden; background: var(--soft); cursor: pointer; transition: border-color 0.2s ease, transform 0.2s ease; }
    .pdp-thumb:hover { transform: translateY(-2px); }
    .pdp-thumb.active { border-color: var(--brand); box-shadow: 0 0 0 3px #dbeafe; }
    .pdp-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .pdp-info { min-width: 0; }
    .pdp-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .pdp-badge { display: inline-flex; align-items: center; padding: 7px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; color: #fff; background: var(--brand); }

      function setupZoom() {
        var wrap = document.getElementById('mainImageWrap');
        if (!wrap) return;
        wrap.addEventListener('mousemove', function(e) {
          var rect = wrap.getBoundingClientRect();
          var x = ((e.clientX - rect.left) / rect.width) * 100;
          var y = ((e.clientY - rect.top) / rect.height) * 100;
          var img = wrap.querySelector('img');
          if (img) {
            img.style.transformOrigin = x + '% ' + y + '%';
          }
        });
        wrap.addEventListener('mouseenter', function() {
          if (wrap.querySelector('img')) wrap.classList.add('zoomed');
        });
        wrap.addEventListener('mouseleave', function() {
          wrap.classList.remove('zoomed');
        });
      }

      function startFlashCountdown(endDate) {
        var el = document.getElementById('flashTimer');
        if (!el) return;
        if (flashInterval) clearInterval(flashInterval);

        function update() {
          var now = new Date().getTime();
          var diff = endDate.getTime() - now;
          if (diff <= 0) {
            el.textContent = 'Encerrada';
            var wrap = document.getElementById('flashTimerWrap');
            if (wrap) wrap.classList.remove('visible');
            if (flashInterval) clearInterval(flashInterval);
            return;
          }
          var h = Math.floor(diff / (1000 * 60 * 60));
          var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          var s = Math.floor((diff % (1000 * 60)) / 1000);
          el.textContent = h.toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
        }
        update();
        flashInterval = setInterval(update, 1000);
      }

      window.selectPhoto = function(photoId) {
        if (!photoId || !photoMap[photoId]) return;

        var photo = photoMap[photoId];

        var mainWrap = document.getElementById('mainImageWrap');
        if (mainWrap) {
          var ind = mainWrap.querySelector('.video-indicator-main');
          var newHtml = '';
          if (config.is_video) {
            var src = config.video_url || config.url || '';
            var isEmbed = /youtube\.com|youtu\.be|vimeo\.com/i.test(src);
            if (isEmbed) {
              newHtml = '<iframe id="mainVideo" src="' + escHtml(src) + '" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width:100%;height:100%;border:0;"></iframe>';
            } else if (src) {
              newHtml = '<video id="mainVideo" src="' + escHtml(src) + '" controls playsinline preload="metadata" style="width:100%;height:100%;object-fit:contain;background:#000;"></video>';
            } else {
              newHtml = '<div class="placeholder-img"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';
            }
          } else if (config.url) {
            newHtml = '<img src="' + escHtml(config.url) + '" alt="' + escHtml(productData ? productData.name : '') + '" id="mainImage" decoding="async">';
          }
          mainWrap.innerHTML = newHtml + (ind ? ind.outerHTML : '');
        }

        var videoIndicator = mainWrap ? mainWrap.querySelector('.video-indicator-main') : null;
        if (config.is_video) {
          if (!videoIndicator && mainWrap) {
            var ind = document.createElement('span');
            ind.className = 'video-indicator-main';
            ind.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Video';
            mainWrap.appendChild(ind);
          }
        } else {
          if (videoIndicator) videoIndicator.remove();
        }

        var thumbs = document.querySelectorAll('.thumb-item');
        thumbs.forEach(function(t) {
          t.classList.toggle('active', t.getAttribute('data-photo-id') === photoId || t.getAttribute('data-photo-id') === config.id);
        });

        var swatches = document.querySelectorAll('.color-swatch');
        swatches.forEach(function(s) {
          s.classList.toggle('active', s.getAttribute('data-photo-id') === photoId || s.getAttribute('data-photo-id') === config.id);
        });

        var sizeOpts = document.querySelectorAll('.size-option');
        sizeOpts.forEach(function(s) {
          s.classList.toggle('active', s.getAttribute('data-photo-id') === photoId || s.getAttribute('data-photo-id') === config.id);
        });

        if (productData) {
          var displayPrice = getPhotoDisplayPrice(photo, productData);
          var originalPrice = getPhotoOriginalPrice(photo, productData);
          var hasDiscount = getPhotoHasDiscount(photo, productData);
          var discountPercent = hasDiscount ? Math.round((1 - displayPrice / originalPrice) * 100) : 0;

          var oldPriceEl = document.getElementById('oldPrice');
          if (oldPriceEl) {
            oldPriceEl.textContent = formatPrice(originalPrice);
            oldPriceEl.classList.toggle('visible', hasDiscount);
          }

          var currentPriceEl = document.getElementById('currentPrice');
          if (currentPriceEl) currentPriceEl.textContent = formatPrice(displayPrice);

          var badge = document.querySelector('.price-discount-badge');
          if (hasDiscount) {
            if (badge) {
              badge.textContent = '-' + discountPercent + '%';
            } else {
              var wrap2 = document.querySelector('.price-current-wrap');
              if (wrap2) {
                var newBadge = document.createElement('span');
                newBadge.className = 'price-discount-badge';
                newBadge.textContent = '-' + discountPercent + '%';
                wrap2.appendChild(newBadge);
              }
            }
          } else {
            if (badge) badge.remove();
          }

          var installments = calcInstallments(displayPrice, 12, 20);
          var instEl = document.getElementById('installmentsInfo');
          if (instEl) {
            if (installments && installments.length > 0) {
              var best = installments[installments.length - 1];
              instEl.innerHTML = 'ou <strong>' + best.qtd + 'x de ' + formatPrice(best.valor) + '</strong> sem juros';
            } else {
              instEl.innerHTML = '';
            }
          }

          var colorInfo = getPhotoColor(photo);
          var colorNameEl = document.getElementById('selectedColorName');
          if (colorNameEl && colorInfo) {
            colorNameEl.textContent = colorInfo.name || '';
          }

          var sizeInfo = getPhotoSize(photo);
          var sizeNameEl = document.getElementById('selectedSizeName');
          if (sizeNameEl && sizeInfo) {
            sizeNameEl.textContent = sizeInfo;
          }
        }

        var simLink = document.getElementById('simulatorPdpLink');
        if (simLink && productId) {
          simLink.href = 'simulador.html?id=' + encodeURIComponent(productId) + '&photo=' + encodeURIComponent(selectedPhotoId || '');
        }
      };

      window.changeQuantity = function(delta) {
        var input = document.getElementById('qtyInput');
        if (!input) return;
        var val = parseInt(input.value) || 1;
        val += delta;
        if (val < 1) val = 1;
        input.value = val;
      };

      window.addToCart = async function() {
        if (!productId) return;
        var qty = parseInt(document.getElementById('qtyInput')?.value) || 1;

        try {
          if (typeof addProductToCart === 'function') {
            var price = 0;
            if (selectedPhotoId && photoMap[selectedPhotoId]) {
              var photo = photoMap[selectedPhotoId];
              price = getPhotoDisplayPrice(photo, productData);
            } else {
              price = parseFloat(productData.discount_price ?? productData.base_price) || 0;
            }
            await addProductToCart(productId, selectedPhotoId, qty, price);
          } else {
            var msg = 'Produto adicionado ao carrinho!';
            if (typeof showToast === 'function') showToast(msg, 'success');
            else alert(msg);
          }
        } catch (e) {
          if (typeof showToast === 'function') showToast('Erro ao adicionar ao carrinho', 'error');
        }
      };

      window.buyNow = async function() {
        if (!productId) return;
        var qty = parseInt(document.getElementById('qtyInput')?.value) || 1;

        try {
          if (typeof addProductToCart === 'function') {
            var price = 0;
            if (selectedPhotoId && photoMap[selectedPhotoId]) {
              var photo = photoMap[selectedPhotoId];
              price = getPhotoDisplayPrice(photo, productData);
            } else {
              price = parseFloat(productData.discount_price ?? productData.base_price) || 0;
            }
            await addProductToCart(productId, selectedPhotoId, qty, price);
            if (typeof siteNavigate === 'function') siteNavigate('checkout.html');
            else window.location.href = 'checkout.html';
          } else {
            if (typeof siteNavigate === 'function') siteNavigate('checkout.html');
            else window.location.href = 'checkout.html';
          }
        } catch (e) {
          if (typeof showToast === 'function') showToast('Erro ao processar compra', 'error');

      window.switchTab = function(tab) {
        var btns = document.querySelectorAll('.tab-btn');
        btns.forEach(function(b) { b.classList.remove('active'); });
        var activeBtn = document.querySelector('.tab-btn[data-tab="' + tab + '"]');
        if (activeBtn) activeBtn.classList.add('active');

        var contents = document.querySelectorAll('.tab-content');
        contents.forEach(function(c) { c.classList.remove('active'); });
        var activeContent = document.getElementById('tab-' + tab);
        if (activeContent) activeContent.classList.add('active');
      };

      function renderSimilarProducts(products) {
        var grid = document.getElementById('similarGrid');
        if (!grid) return;

        if (!products || products.length === 0) {
          var section = document.getElementById('similarSection');
          if (section) section.style.display = 'none';
          return;
        }

        grid.innerHTML = products.map(function(p) {
          var photo = p.product_photos && p.product_photos.length > 0 ? p.product_photos[0] : null;
          var imgHtml = photo && photo.url
            ? '<img src="' + photo.url + '" alt="' + escHtml(p.name) + '" loading="lazy">'
            : '<div class="sim-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>';

          var basePrice = parseFloat(p.base_price) || 0;
          var salePrice = p.discount_price ? parseFloat(p.discount_price) : null;
          var hasDiscount = salePrice !== null && salePrice < basePrice;
          var displayPrice = hasDiscount ? salePrice : basePrice;

          var installments = calcInstallments(displayPrice, 12, 20);
          var installmentHtml = '';
          if (installments && installments.length > 0) {
            var best = installments[installments.length - 1];
            installmentHtml = '<span class="sim-installment">' + best.qtd + 'x de ' + formatPrice(best.valor) + ' sem juros</span>';
          }

          var catName = '';
          if (p.category_id && categories.length > 0) {
            var cat = categories.find(function(c) { return c.id === p.category_id; });
            catName = cat ? cat.name : '';
          }

          return '<a href="produto.html?id=' + p.id + '" class="sim-prod-card">' +
            '<div class="sim-img">' + imgHtml + '</div>' +
            '<div class="sim-body">' +
            (catName ? '<span class="sim-cat">' + escHtml(catName) + '</span>' : '') +
            '<h3 class="sim-name">' + escHtml(p.name) + '</h3>' +
            (hasDiscount ? '<span class="sim-old-price">' + formatPrice(basePrice) + '</span>' : '') +
            '<div class="sim-price-row">' +
            '<span class="sim-price">' + formatPrice(displayPrice) + '</span>' +
            '</div>' +
            installmentHtml +
            '</div></a>';
        }).join('');
      }

      async function loadSimilarProducts() {
        if (!productData) {
          renderSimilarProducts([]);
          return;
        }

        try {
          sb = getSupabase();
          if (!sb) {
            renderSimilarProducts([]);
            return;
          }

          var query = sb.from('products')
            .select('*, product_photos(*)')
            .eq('active', true)
            .neq('id', productData.id);

          if (productData.category_id) {
            query = query.eq('category_id', productData.category_id);
          }

          query = query.order('featured', { ascending: false })
            .order('created_at', { ascending: false })
            .limit(4);

          var resp = await query;
          var data = resp.data;
          var error = resp.error;

          if (error || !data || data.length === 0) {
            renderSimilarProducts([]);
            return;
          }

          renderSimilarProducts(data);
        } catch (e) {
          renderSimilarProducts([]);
        }
      }

      async function loadProduct() {
        var container = document.getElementById('productContent');
        if (!productId) {
          container.innerHTML =
            '<div class="not-found">' +
            '<h2>Produto não encontrado</h2>' +
            '<p>ID do produto não informado.</p>' +
            '<a href="produtos.html">Ver todos os produtos</a>' +
            '</div>';
          return;
        }

        try {
          sb = getSupabase();
          if (!sb) {
            loadFallback();
            return;
          }

          var prodResp = await sb.from('products')
            .select('*, category:categories(*), product_photos(*)')
            .eq('id', productId)
            .single();

          var prodData = prodResp.data;
          var prodError = prodResp.error;

          if (prodError || !prodData) {
            loadFallback();
            return;
          }

          var catResp = await sb.from('categories')
            .select('id, name, slug')
            .eq('active', true)
            .order('sort_order', { ascending: true });

          if (catResp.data) {
            categories = catResp.data;
          }

          productData = prodData;
          if (prodData.product_photos) {
            photos = prodData.product_photos;
          }

          var catName = '';
          if (prodData.category && prodData.category.name) {
            catName = prodData.category.name;
          } else if (prodData.category_id && categories.length > 0) {
            var cat = categories.find(function(c) { return c.id === prodData.category_id; });
            catName = cat ? cat.name : '';
          }

          var titleEl = document.querySelector('title');
          if (titleEl) titleEl.textContent = prodData.name + ' - Conforta Colchões';

          var metaDesc = document.querySelector('meta[name="description"]');
          if (metaDesc && prodData.seo_description) metaDesc.content = prodData.seo_description;

          renderProduct();
          loadSimilarProducts();

        } catch (e) {
          loadFallback();
        }
      }

      function loadFallback() {
        productData = FALLBACK_PRODUCT;
        photos = FALLBACK_PRODUCT.product_photos || [];

        categories = [
          { id: 'cat-1', name: 'Colchões', slug: 'colchoes' },
          { id: 'cat-2', name: 'Sofás', slug: 'sofas' },
          { id: 'cat-3', name: 'Box baú', slug: 'box-bau' },
          { id: 'cat-4', name: 'Cabeceiras', slug: 'cabeceiras' },
          { id: 'cat-5', name: 'Kits', slug: 'kits' }
        ];

        var titleEl = document.querySelector('title');
        if (titleEl) titleEl.textContent = FALLBACK_PRODUCT.name + ' - Conforta Colchões';

        renderProduct();
        renderSimilarProducts([]);
      }

      // Capturar ID antes mesmo do DOMContentLoaded
      getUrlParams();

      document.addEventListener('DOMContentLoaded', function() {
        try { if (typeof initSupabase === 'function') initSupabase(); } catch(e) { void e; }

        try {
          if (typeof renderCompactFooter === 'function') renderCompactFooter('#siteFooter');
        } catch(e) { void e; }

        if (!productId) getUrlParams();

        var cartCountEl = document.getElementById('cartCount');
        var mobileMenu = document.getElementById('mobileMenu');
        var mobileMenuBtn = document.getElementById('mobileMenuBtn');
        var menuIcon = document.getElementById('menuIcon');
        var closeIcon = document.getElementById('closeIcon');

        if (mobileMenuBtn && mobileMenu) {
          mobileMenuBtn.addEventListener('click', function() {
            var isOpen = mobileMenu.classList.toggle('open');
            if (menuIcon) menuIcon.style.display = isOpen ? 'none' : 'block';
            if (closeIcon) closeIcon.style.display = isOpen ? 'block' : 'none';
          });
        }

        document.addEventListener('click', function(e) {
          if (mobileMenu && mobileMenuBtn && !mobileMenu.contains(e.target) && e.target !== mobileMenuBtn && !mobileMenuBtn.contains(e.target)) {
            mobileMenu.classList.remove('open');
            if (menuIcon) menuIcon.style.display = 'block';
            if (closeIcon) closeIcon.style.display = 'none';
          }
        });

        loadProduct();

        if (typeof updateCartCount === 'function') updateCartCount();
      });

    })();
  </script>
  <script>
    (function() {
      'use strict';

      var sb = null;
      var productId = null;
      var productData = null;
      var categories = [];
      var photos = [];
      var photoMap = {};
      var selectedPhotoId = null;
      var selectedQty = 1;

      function getUrlParams() {
        try {
          var params = new URLSearchParams(window.location.search || '');
          productId = (params.get('id') || params.get('produto') || '').trim();
          if (productId) {
            try { productId = decodeURIComponent(productId); } catch (_) {}
            productId = productId.trim();
          }
        } catch (_) {
          productId = '';
        }
        if (!productId && window.location.hash) {
          var m = window.location.hash.match(/id=([^&]+)/);
          if (m) {
            try { productId = decodeURIComponent(m[1]).trim(); } catch (_) { productId = m[1].trim(); }
          }
        }
      }

      function escHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }

      function stripHtml(value) {
        return String(value || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
      }

      function money(value) {
        if (typeof formatPrice === 'function') return formatPrice(value);
        var n = parseFloat(value) || 0;
        return 'R$ ' + n.toFixed(2).replace('.', ',');
      }

      function getPhotoConfig(photo) {
        if (!photo) return null;
        if (photo.same_as_photo_id && photoMap[photo.same_as_photo_id]) return getPhotoConfig(photoMap[photo.same_as_photo_id]);
        return photo;
      }

      function currentPhoto() {
        return selectedPhotoId && photoMap[selectedPhotoId] ? photoMap[selectedPhotoId] : photos[0] || null;
      }

      function displayPrice(photo, product) {
        var config = getPhotoConfig(photo);
        return parseFloat((config && (config.discount_price ?? config.price)) ?? product.discount_price ?? product.sale_price ?? product.base_price ?? product.price ?? 0) || 0;
      }

      function originalPrice(photo, product) {
        var config = getPhotoConfig(photo);
        return parseFloat((config && config.price) ?? product.base_price ?? product.price ?? 0) || 0;
      }

      function hasDiscount(photo, product) {
        var original = originalPrice(photo, product);
        var current = displayPrice(photo, product);
        return !!(original && current && current < original);
      }

      function getStock(photo, product) {
        var config = getPhotoConfig(photo);
        if (config && config.stock_override !== null && config.stock_override !== undefined) return parseInt(config.stock_override, 10);
        if (product.stock !== null && product.stock !== undefined) return parseInt(product.stock, 10);
        return null;
      }

      function categoryName(product) {
        if (product.category && product.category.name) return product.category.name;
        var cat = categories.find(function(c) { return String(c.id) === String(product.category_id); });
        return cat ? cat.name : '';
      }

      function productText(product) {
        return String([
          product.name,
          stripHtml(product.description),
          product.material,
          product.dimensions,
          product.warranty,
          Array.isArray(product.tags) ? product.tags.join(' ') : product.tags
        ].join(' ')).toLowerCase();
      }

      function isNew(product) {
        if (!product.created_at) return false;
        var created = new Date(product.created_at).getTime();
        return !isNaN(created) && Date.now() - created < 1000 * 60 * 60 * 24 * 45;
      }

      function shortCopy(product) {
        var description = stripHtml(product.description || '');
        if (description) return description.slice(0, 170) + (description.length > 170 ? '...' : '');
        return 'Conforto, qualidade e praticidade para transformar suas noites de sono com atendimento especializado da Conforta Colchões.';
      }

      function showSkeleton() {
        document.getElementById('productContent').innerHTML =
          '<div class="container skeleton-page">' +
            '<div><div class="sk sk-media"></div><div class="sk-thumbs"><div class="sk sk-thumb"></div><div class="sk sk-thumb"></div><div class="sk sk-thumb"></div></div></div>' +
            '<div><div class="sk sk-line" style="width:34%"></div><div class="sk sk-title"></div><div class="sk sk-line" style="width:70%"></div><div class="sk sk-price"></div><div class="sk sk-button"></div><div class="sk sk-button"></div><div class="sk sk-line" style="width:88%;margin-top:26px"></div><div class="sk sk-line" style="width:76%"></div></div>' +
          '</div>';
      }

      function renderErrorState() {
        try {
          window.CONFORTA_PAGE_PRODUCT_FOR_CHAT = null;
        } catch (_) {}
        document.getElementById('productContent').innerHTML =
          '<div class="container error-state">' +
            '<svg width="62" height="62" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v5"/><path d="M12 17h.01"/></svg>' +
            '<h1>Produto não encontrado</h1>' +
            '<p>Não conseguimos carregar as informações deste produto. Confira o link ou volte à vitrine.</p>' +
            '<div class="final-actions"><a class="btn btn-primary" href="produtos.html">Ver colchões</a></div>' +
          '</div>';
      }

      async function loadProduct() {
        showSkeleton();
        getUrlParams();
        if (!productId) {
          renderErrorState();
          return;
        }
        try {
          sb = getSupabase();
          if (!sb) throw new Error('Supabase indisponível');
          var prodResp = await sb.from('products').select('*, product_photos(*)').eq('id', productId).maybeSingle();
          if (prodResp.error) throw prodResp.error;
          if (!prodResp.data) throw new Error('Produto não encontrado');
          var catResp = await sb.from('categories').select('id, name, slug').eq('active', true).order('sort_order', { ascending: true });
          categories = catResp.data || [];
          productData = prodResp.data;
          photos = (productData.product_photos || []).slice().sort(function(a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });
          photoMap = {};
          photos.forEach(function(photo) { photoMap[photo.id] = photo; });
          selectedPhotoId = photos[0] ? photos[0].id : null;
          updateMeta();
          renderProduct();
          loadRelatedProducts();
        } catch (e) {
          renderErrorState();
        }
      }

      function updateMeta() {
        if (!productData) return;
        document.title = productData.name + ' - Conforta Colchões';
        var meta = document.querySelector('meta[name="description"]');
        if (meta) {
          meta.content = productData.seo_description || stripHtml(productData.description || 'Produto Conforta Colchões com atendimento especializado e entrega rápida na região.').slice(0, 155);
        }
      }

      function renderProduct() {
        var product = productData;
        var photo = currentPhoto();
        var current = displayPrice(photo, product);
        var original = originalPrice(photo, product);
        var discounted = hasDiscount(photo, product);
        var discount = discounted ? Math.round((1 - current / original) * 100) : 0;
        var stock = getStock(photo, product);
        var unavailable = stock !== null && stock <= 0;
        var catName = categoryName(product);
        selectedQty = clampQty(selectedQty, stock);

        document.getElementById('productContent').innerHTML =
          '<div class="container product-shell">' +
            '<nav class="pdp-back" aria-label="Navegacao"><a href="produtos.html">← Voltar aos colchões</a></nav>' +
            '<div class="pdp-main">' +
              renderGallery(product) +
              '<div class="pdp-info">' +
                '<div class="pdp-badges">' + renderBadges(product, discounted, unavailable) + '</div>' +
                (catName ? '<div class="pdp-category">' + escHtml(catName) + '</div>' : '') +
                '<h2>' + escHtml(product.name) + '</h2>' +
                '<div class="pdp-meta">' + (product.sku ? '<span>SKU: ' + escHtml(product.sku) + '</span>' : '') + '<span class="pdp-stars">★★★★★</span><span>Atendimento especializado</span></div>' +
                '<p class="pdp-short">' + escHtml(shortCopy(product)) + '</p>' +
                renderPrice(current, original, discounted, discount) +
                renderVariants() +
                renderQty(stock, unavailable) +
                renderDeliveryBlock() +
                renderActions(unavailable) +
                renderBenefits(product) +
              '</div>' +
            '</div>' +
            renderDetailsSections(product, catName) +
            '<section class="pdp-section" id="relatedSection" style="display:none"><h2>Você também pode gostar</h2><div class="related-grid" id="relatedGrid"></div></section>' +
          '</div>' +
          renderMobileBuyBar(current, unavailable);

        bindGallery();
        bindDynamicButtons();
        updateWhatsappLinks();
        syncChatPageProduct();
      }

      function renderBadges(product, discounted, unavailable) {
        var html = '';
        if (unavailable) html += '<span class="pdp-badge unavailable">Indisponível no momento</span>';
        if (discounted) html += '<span class="pdp-badge offer">Oferta</span>';
        if (product.featured || product.best_seller) html += '<span class="pdp-badge">Mais vendido</span>';
        html += '<span class="pdp-badge fast">Entrega rápida</span>';
        if (product.warranty) html += '<span class="pdp-badge warranty">Garantia</span>';
        if (isNew(product)) html += '<span class="pdp-badge new">Novo</span>';
        return html;
      }

      function absolutizeMediaUrl(u) {
        if (u === null || u === undefined) return '';
        var s = String(u).trim();
        if (!s) return '';
        if (/^https?:\/\//i.test(s)) return s;
        try {
          return new URL(s, window.location.href).href;
        } catch (_) {
          return s;
        }
      }

      /** GLB publico no Supabase Storage: bucket modelos-3d / {product.id}.glb */
      function resolveSupabaseDefaultModelGlb(product) {
        if (!product || !product.id) return '';
        var base = '';
        if (typeof SUPABASE_CONFIG !== 'undefined' && SUPABASE_CONFIG && SUPABASE_CONFIG.url) {
          base = String(SUPABASE_CONFIG.url).replace(/\/$/, '');
        }
        if (!base) return '';
        return base + '/storage/v1/object/public/modelos-3d/' + encodeURIComponent(String(product.id)) + '.glb';
      }

      /** GLB por variacao: coluna model_glb_url, depois convenção Supabase, depois assets/models/... */
      function resolveModelGlbSrc(config, product) {
        if (!config || !product) return '';
        var direct = (config.model_glb_url || '').trim();
        if (direct) return absolutizeMediaUrl(direct);
        var sup = resolveSupabaseDefaultModelGlb(product);
        if (sup) return absolutizeMediaUrl(sup);
        var slug = String(product.slug || 'produto').replace(/[^a-z0-9-_]/gi, '_').toLowerCase().replace(/_+/g, '_').replace(/^_|_$/g, '') || 'produto';
        var id = String(config.id || '').replace(/-/g, '');
        var shortId = id.slice(0, 12);
        if (!shortId) return '';
        return absolutizeMediaUrl('assets/models/' + slug + '-' + shortId + '.glb');
      }

      function renderGallery(product) {
        var photo = currentPhoto();
        var media = mainMediaHtml(photo, product);
        var thumbs = photos.length > 1
          ? '<div class="pdp-thumbs">' + photos.map(function(ph) {
              var config = getPhotoConfig(ph);
              var src = ph.thumb_url || ph.url || '';
              return '<button class="pdp-thumb' + (ph.id === selectedPhotoId ? ' active' : '') + '" type="button" data-photo-id="' + ph.id + '" aria-label="Ver imagem do produto">' +
                (src ? '<img src="' + escHtml(src) + '" alt="Miniatura de ' + escHtml(product.name) + '">' : placeholderSvg()) +
              '</button>';
            }).join('') + '</div>'
          : '';
        return '<section class="pdp-gallery">' +
          '<div class="pdp-main-media' + (photo && !photo.is_video ? ' zoomable' : '') + '" id="mainMedia">' + media + '</div>' +
          thumbs +
        '</section>';
      }

      function mainMediaHtml(photo, product) {
        var config = getPhotoConfig(photo);
        if (config && config.is_video) {
          var src = config.video_url || config.url || '';
          if (/youtube\.com|youtu\.be|vimeo\.com/i.test(src)) return '<iframe src="' + escHtml(src) + '" title="' + escHtml(product.name) + '" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width:100%;height:100%;border:0;"></iframe>';
          if (src) return '<video src="' + escHtml(src) + '" controls playsinline style="width:100%;height:100%;object-fit:contain;background:#000;"></video>';
        }
        if (config && config.url) return '<img src="' + escHtml(absolutizeMediaUrl(config.url)) + '" alt="' + escHtml(product.name) + '" id="mainProductImage" decoding="async">';
        return '<div class="pdp-placeholder">' + placeholderSvg() + '<strong>' + escHtml(categoryName(product) || product.name) + '</strong><span>Imagem indisponível no momento</span></div>';
      }

      function placeholderSvg() {
        return '<svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
      }

      function renderPrice(current, original, discounted, discount) {
        var installments = typeof calcInstallments === 'function' ? calcInstallments(current, 12, 20) : [];
        var best = installments && installments.length ? installments[installments.length - 1] : null;
        return '<div class="price-card">' +
          '<span class="price-old">' + (discounted ? money(original) : '&nbsp;') + '</span>' +
          '<div class="price-row"><strong class="price-now" id="currentPrice">' + money(current) + '</strong>' + (discounted ? '<span class="discount-pill">-' + discount + '%</span>' : '') + '</div>' +
          (best ? '<div class="installment">ou ' + best.qtd + 'x de ' + money(best.valor) + ' sem juros</div>' : '<div class="installment">Pagamento facilitado</div>') +
          '<div class="secure-copy">Pagamento facilitado e compra segura</div>' +
        '</div>';
      }

      function renderVariants() {
        var colors = uniquePhotos('color_name');
        var sizes = uniquePhotos('size');
        var html = '';
        if (colors.length) {
          html += '<div class="variant-group"><div class="variant-title">Cor: <span id="selectedColorName">' + escHtml((getPhotoConfig(currentPhoto()) || {}).color_name || '') + '</span></div><div class="swatch-list">' +
            colors.map(function(item) {
              var config = getPhotoConfig(item.photo);
              return '<button class="color-swatch' + (item.photo.id === selectedPhotoId ? ' active' : '') + '" type="button" data-photo-id="' + item.photo.id + '" style="background:' + escHtml(config.color_hex || '#e2e8f0') + '" aria-label="Selecionar cor ' + escHtml(item.value) + '"></button>';
            }).join('') + '</div></div>';
        }
        if (sizes.length) {
          html += '<div class="variant-group"><div class="variant-title">Tamanho: <span id="selectedSizeName">' + escHtml((getPhotoConfig(currentPhoto()) || {}).size || '') + '</span></div><div class="size-list">' +
            sizes.map(function(item) {
              return '<button class="size-chip' + (item.photo.id === selectedPhotoId ? ' active' : '') + '" type="button" data-photo-id="' + item.photo.id + '">' + escHtml(item.value) + '</button>';
            }).join('') + '</div></div>';
        }
        return html;
      }

      function uniquePhotos(field) {
        var seen = {};
        var out = [];
        photos.forEach(function(photo) {
          var config = getPhotoConfig(photo);
          var value = config && config[field];
          if (value && !seen[value]) {
            seen[value] = true;
            out.push({ value: value, photo: photo });
          }
        });
        return out;
      }

      function renderQty(stock, unavailable) {
        var note = '';
        var cls = 'stock-note';
        if (unavailable) {
          note = 'Produto indisponível no momento. Consulte disponibilidade pelo WhatsApp.';
          cls += ' out';
        } else if (stock !== null && stock <= 5) {
          note = 'Estoque limitado: ' + stock + ' unidade' + (stock === 1 ? '' : 's') + ' disponível' + (stock === 1 ? '' : 'is') + '.';
          cls += ' warn';
        } else {
          note = 'Produto selecionado para mais conforto e entrega rápida.';
        }
        return '<div class="qty-row"><label for="qtyInput">Quantidade</label><div class="qty-control"><button type="button" id="qtyMinus" aria-label="Diminuir quantidade">-</button><input id="qtyInput" type="text" value="' + selectedQty + '" readonly aria-label="Quantidade"><button type="button" id="qtyPlus" aria-label="Aumentar quantidade">+</button></div></div><div class="' + cls + '">' + escHtml(note) + '</div>';
      }

      function renderDeliveryBlock() {
        return '<section class="delivery-card"><h2>Entrega e disponibilidade</h2><p class="delivery-message">Entrega rápida em Serra, Vitória e região. Confirme o prazo e disponibilidade com nossa equipe pelo WhatsApp.</p><div class="cep-row"><input type="text" id="cepInput" inputmode="numeric" placeholder="Digite seu CEP" aria-label="Digite seu CEP"><button class="btn btn-outline" type="button" id="cepBtn">Calcular</button></div><p class="delivery-message" id="cepMessage">Fale conosco para confirmar prazo e disponibilidade.</p></section>';
      }

      function renderActions(unavailable) {
        var cfg = getPhotoConfig(currentPhoto());
        var has3d = !!(cfg && productData && !cfg.is_video && resolveModelGlbSrc(cfg, productData));
        var simHref =
          'simulador.html?id=' +
          encodeURIComponent(productId || '') +
          '&photo=' +
          encodeURIComponent(selectedPhotoId || '');
        return (
          '<div class="pdp-actions">' +
          '<button class="btn btn-primary" type="button" id="buyNowBtn" ' +
          (unavailable ? 'disabled' : '') +
          '>Comprar agora</button>' +
          '<button class="btn btn-outline" type="button" id="addToCartBtn" ' +
          (unavailable ? 'disabled' : '') +
          '>Adicionar ao carrinho</button>' +
          (has3d
            ? '<a class="btn btn-outline" id="simulatorPdpLink" href="' +
              escHtml(simHref) +
              '">Monte seu quarto 3D</a>'
            : '') +
          '<a class="btn btn-whatsapp js-whatsapp" id="whatsappBtn" data-product="' +
          escHtml(productData.name) +
          '" href="' +
          whatsappHref(productData.name) +
          '">' +
          (unavailable ? 'Consultar disponibilidade' : 'Tirar duvida no WhatsApp') +
          '</a>' +
          '</div>'
        );
      }

      function renderBenefits(product) {
        return '<div class="benefit-grid">' +
          benefitIcon('Entrega rápida') +
          benefitIcon('Até 12x sem juros') +
          benefitIcon('Atendimento especializado') +
          benefitIcon('Compra segura') +
          benefitIcon(product.warranty ? 'Garantia do produto' : 'Produto selecionado') +
        '</div>';
      }

      function benefitIcon(text) {
        return '<div class="benefit-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>' + escHtml(text) + '</div>';
      }

      function renderDetailsSections(product, catName) {
        var desc = product.description || '<p>Produto selecionado pela Conforta Colchões para oferecer conforto, qualidade e praticidade no dia a dia.</p>';
        return '<section class="pdp-section"><h2>Descrição do produto</h2>' + desc + '</section>' +
          '<section class="pdp-section"><h2>Para quem e indicado?</h2><ul>' + indicationBullets(product, catName).map(function(item) { return '<li>' + escHtml(item) + '</li>'; }).join('') + '</ul></section>' +
          '<section class="pdp-section"><h2>Especificacoes tecnicas</h2>' + renderSpecs(product, catName) + '</section>' +
          '<section class="pdp-section"><h2>Cuidados com seu produto</h2><ul><li>Evite dobrar ou forçar a estrutura do colchão.</li><li>Gire o colchão periodicamente, se recomendado pelo fabricante.</li><li>Use em base adequada.</li><li>Evite exposição direta à umidade.</li><li>Consulte a garantia para orientações específicas.</li></ul></section>';
      }

      function indicationBullets(product, catName) {
        var text = productText(product);
        var items = ['Para quem busca mais conforto no sono.', 'Para quem quer renovar o quarto com praticidade.', 'Para quem valoriza entrega rápida e atendimento especializado.'];
        if (/casal|queen|king|solteiro/i.test(text)) items.splice(1, 0, 'Para quartos de casal, solteiro ou suite, conforme o produto.');
        if (/firme|ortoped/i.test(text)) items.splice(1, 0, 'Para quem prefere suporte mais firme e estavel.');
        if (/macio|confort/i.test(text)) items.splice(1, 0, 'Para quem prefere uma sensacao mais confortavel ao deitar.');
        return items;
      }

      function renderSpecs(product, catName) {
        var rows = [];
        addSpec(rows, 'Categoria', catName);
        addSpec(rows, 'Marca', product.brand || product.marca);
        addSpec(rows, 'Modelo', product.model || product.modelo);
        addSpec(rows, 'Tamanho', findTextValue(product, /(?:solteiro|casal|queen|king)[^,.;<]*/i));
        addSpec(rows, 'Densidade', findTextValue(product, /D(?:23|28|33|45)/i));
        addSpec(rows, 'Tipo de conforto', findTextValue(product, /(?:macio|intermediario|firme|ortopedico)/i));
        addSpec(rows, 'Dimensoes', product.dimensions);
        addSpec(rows, 'Peso', product.weight ? product.weight + (typeof product.weight === 'number' ? ' kg' : '') : '');
        addSpec(rows, 'Peso suportado', product.supported_weight || product.peso_suportado);
        addSpec(rows, 'Garantia', product.warranty);
        addSpec(rows, 'Material', product.material);
        addSpec(rows, 'SKU', product.sku);
        if (!rows.length) return '<p>Consulte nossa equipe para confirmar medidas e especificacoes deste produto.</p>';
        return '<div class="spec-grid">' + rows.map(function(row) { return '<div class="spec-item"><span>' + escHtml(row.label) + '</span><strong>' + escHtml(row.value) + '</strong></div>'; }).join('') + '</div>';
      }

      function addSpec(rows, label, value) {
        if (value !== null && value !== undefined && String(value).trim()) rows.push({ label: label, value: String(value).trim() });
      }

      function findTextValue(product, regex) {
        var match = productText(product).match(regex);
        return match ? match[0] : '';
      }

      function renderMobileBuyBar(price, unavailable) {
        return '<div class="mobile-buybar"><div class="mobile-buybar-inner"><div class="mobile-price"><span>Total</span>' + money(price) + '</div><button class="btn btn-primary" type="button" id="mobileBuyBtn" ' + (unavailable ? 'disabled' : '') + '>' + (unavailable ? 'Indisponível' : 'Comprar') + '</button></div></div>';
      }

      function renderFinalHelp() {
        return '';
      }

      function clampQty(value, stock) {
        var qty = parseInt(value, 10) || 1;
        if (qty < 1) qty = 1;
        if (stock !== null && stock > 0 && qty > stock) qty = stock;
        return qty;
      }

      /** Contexto para o chat / n8n: preço da variante selecionada (foto), sem inventar orçamento. */
      function syncChatPageProduct() {
        try {
          if (!productData || !productData.id) {
            window.CONFORTA_PAGE_PRODUCT_FOR_CHAT = null;
            return;
          }
          var photo = currentPhoto();
          var cfg = getPhotoConfig(photo);
          var vitrine = displayPrice(photo, productData);
          var orig = originalPrice(photo, productData);
          var base = parseFloat(productData.base_price) || null;
          var disc = productData.discount_price != null && productData.discount_price !== '' ? parseFloat(productData.discount_price) : null;
          var path = 'produto.html?id=' + encodeURIComponent(String(productData.id));
          var pageUrl = '';
          try {
            pageUrl = new URL(path, window.location.href).href;
          } catch (_) {
            pageUrl = path;
          }
          window.CONFORTA_PAGE_PRODUCT_FOR_CHAT = {
            source: 'pdp',
            id: productData.id,
            name: productData.name,
            slug: productData.slug,
            sku: productData.sku || null,
            base_price: base,
            discount_price: disc,
            preco_exibido_vitrine: vitrine,
            preco_riscado_vitrine: orig > vitrine ? orig : null,
            moeda: 'BRL',
            photo_id: cfg && cfg.id ? cfg.id : null,
            variante: {
              cor: cfg && cfg.color_name ? cfg.color_name : null,
              tamanho: cfg && cfg.size ? cfg.size : null,
              etiqueta: cfg && cfg.custom_label ? cfg.custom_label : null
            },
            product_page_url: pageUrl,
            nota_precos:
              'O preço correto a citar para esta página é preco_exibido_vitrine (variante da foto selecionada). ' +
              'Nao substitua por outro produto do catalogo. Orcamento com frete e condicao de parcelamento: checkout ou WhatsApp da loja.'
          };
        } catch (_) {
          window.CONFORTA_PAGE_PRODUCT_FOR_CHAT = null;
        }
      }

      function bindGallery() {
        document.querySelectorAll('[data-photo-id]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            selectedPhotoId = this.getAttribute('data-photo-id');
            renderProduct();
          });
        });
        attachImageFallbacks();
      }

      function attachImageFallbacks() {
        document.querySelectorAll('img').forEach(function(img) {
          img.addEventListener('error', function() {
            var parent = img.parentNode;
            img.remove();
            if (parent && !parent.querySelector('.pdp-placeholder')) parent.insertAdjacentHTML('beforeend', '<div class="pdp-placeholder">' + placeholderSvg() + '<span>Imagem indisponível</span></div>');
          });
        });
      }

      function bindDynamicButtons() {
        var minus = document.getElementById('qtyMinus');
        var plus = document.getElementById('qtyPlus');
        var cepBtn = document.getElementById('cepBtn');
        var addBtn = document.getElementById('addToCartBtn');
        var buyBtn = document.getElementById('buyNowBtn');
        var mobileBuy = document.getElementById('mobileBuyBtn');
        if (minus) minus.addEventListener('click', function() { changeQty(-1); });
        if (plus) plus.addEventListener('click', function() { changeQty(1); });
        if (cepBtn) cepBtn.addEventListener('click', handleCep);
        if (addBtn) addBtn.addEventListener('click', addToCartOnly);
        if (buyBtn) buyBtn.addEventListener('click', buyNow);
        if (mobileBuy) mobileBuy.addEventListener('click', buyNow);
      }

      function changeQty(delta) {
        selectedQty = clampQty(selectedQty + delta, getStock(currentPhoto(), productData));
        var input = document.getElementById('qtyInput');
        if (input) input.value = selectedQty;
      }

      async function handleCep() {
        var input = document.getElementById('cepInput');
        var msg = document.getElementById('cepMessage');
        if (!msg) return;
        var raw = input ? String(input.value || '') : '';
        var cep = raw.replace(/\D/g, '');
        if (cep.length !== 8) {
          msg.textContent = 'Digite um CEP com 8 digitos.';
          return;
        }
        msg.textContent = 'Consultando frete...';
        var subtotal = 0;
        try {
          var photo = currentPhoto();
          if (productData && photo) {
            var unit = parseFloat(displayPrice(photo, productData)) || 0;
            subtotal = unit * (selectedQty || 1);
          }
        } catch (eSub) {
          void eSub;
        }
        try {
          var r = await fetch('/api/cep-freight', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cep: cep, subtotal: subtotal })
          });
          var j = await r.json().catch(function () {
            return {};
          });
          if (!r.ok && j.error) {
            msg.textContent = 'Nao foi possivel consultar o CEP agora. Tente de novo em instantes.';
            return;
          }
          if (j.delivered === false) {
            msg.textContent = j.message || 'Infelizmente não realizamos entrega para este CEP.';
            return;
          }
          if (j.delivered) {
            var fr = parseFloat(j.freight_amount) || 0;
            var parts = [];
            if (fr <= 0) parts.push('Frete gratis para este valor.');
            else parts.push('Frete estimado: ' + formatPrice(fr));
            if (j.label) parts.push(j.label);
            if (j.free_shipping_applied) parts.push('(pedido acima do minimo para frete gratis)');
            msg.textContent = parts.join(' ');
            return;
          }
          msg.textContent = 'Resposta incompleta. Tente novamente.';
        } catch (e) {
          void e;
          msg.textContent = 'Erro de rede ao consultar o CEP.';
        }
      }

      async function addToCartOnly() {
        await addCurrentProductToCart(false);
      }

      async function buyNow() {
        await addCurrentProductToCart(true);
      }

      async function addCurrentProductToCart(goCheckout) {
        if (!productData || !productId) return;
        var photo = currentPhoto();
        var stock = getStock(photo, productData);
        if (stock !== null && stock <= 0) {
          if (typeof showToast === 'function') showToast('Produto indisponível no momento', 'info');
          return;
        }
        var price = displayPrice(photo, productData);
        if (typeof addProductToCart === 'function') {
          await addProductToCart(productId, selectedPhotoId, selectedQty, price);
        }
        if (goCheckout) {
          if (typeof siteNavigate === 'function') siteNavigate('checkout.html');
          else window.location.href = 'checkout.html';
        }
      }

      async function loadRelatedProducts() {
        try {
          if (!sb || !productData || !productData.category_id) return;
          var resp = await sb.from('products').select('*, product_photos(*)').eq('active', true).eq('category_id', productData.category_id).neq('id', productData.id).order('featured', { ascending: false }).order('created_at', { ascending: false }).limit(4);
          if (resp.error || !resp.data || !resp.data.length) return;
          renderRelated(resp.data);
        } catch (_) {}
      }

      function renderRelated(products) {
        var section = document.getElementById('relatedSection');
        var grid = document.getElementById('relatedGrid');
        if (!section || !grid) return;
        grid.innerHTML = products.map(function(product) {
          var photo = (product.product_photos || [])[0];
          var price = displayPrice(photo, product);
          return '<a class="related-card" href="produto.html?id=' + encodeURIComponent(product.id) + '"><div class="related-img">' + (photo && photo.url ? '<img src="' + escHtml(photo.url) + '" alt="' + escHtml(product.name) + '" loading="lazy">' : placeholderSvg()) + '</div><div class="related-body"><h3>' + escHtml(product.name) + '</h3><strong class="related-price">' + money(price) + '</strong><span class="btn btn-outline">Ver produto</span></div></a>';
        }).join('');
        section.style.display = '';
      }

      function normalizeWhatsapp(raw) {
        var digits = String(raw || '').replace(/\D/g, '');
        if (!digits) return '';
        if (digits.length === 10 || digits.length === 11) return '55' + digits;
        return digits;
      }

      function whatsappHref(productName) {
        var msg = 'Olá! Tenho interesse no produto ' + (productName || 'da Conforta Colchões') + '. Pode me ajudar?';
        if (window.CONFORTA_WHATSAPP_URL) return window.CONFORTA_WHATSAPP_URL + '?text=' + encodeURIComponent(msg);
        return '#';
      }

      async function configureWhatsapp() {
        var phone = '';
        try {
          if (typeof getSetting === 'function') phone = await getSetting('whatsapp_number');
          if (!phone && typeof getSetting === 'function') phone = await getSetting('contact_phone');
        } catch (_) {}
        var normalized = normalizeWhatsapp(phone);
        if (normalized) window.CONFORTA_WHATSAPP_URL = 'https://wa.me/' + normalized;
        updateWhatsappLinks();
      }

      function updateWhatsappLinks() {
        document.querySelectorAll('.js-whatsapp').forEach(function(link) {
          if (window.CONFORTA_WHATSAPP_URL) {
            link.href = whatsappHref(link.getAttribute('data-product') || (productData && productData.name));
            link.target = '_blank';
            link.rel = 'noopener';
          } else {
            link.addEventListener('click', function(e) {
              e.preventDefault();
              if (typeof window.openChatWidget === 'function') window.openChatWidget();
              else if (typeof window.toggleChat === 'function') window.toggleChat();
              else if (typeof showToast === 'function') showToast('Atendimento indisponível no momento', 'info');
            }, { once: true });
          }
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        try { if (typeof initSupabase === 'function') initSupabase(); } catch (_) {}
        sb = getSupabase();
        if (typeof renderCompactFooter === 'function') renderCompactFooter('#siteFooter');
        getUrlParams();
        configureWhatsapp();
        loadProduct();

        var mobileMenu = document.getElementById('mobileMenu');
        var mobileMenuBtn = document.getElementById('mobileMenuBtn');
        var menuIcon = document.getElementById('menuIcon');
        var closeIcon = document.getElementById('closeIcon');
        if (mobileMenuBtn && mobileMenu) {
          mobileMenuBtn.addEventListener('click', function() {
            var isOpen = mobileMenu.classList.toggle('open');
            if (menuIcon) menuIcon.style.display = isOpen ? 'none' : 'block';
            if (closeIcon) closeIcon.style.display = isOpen ? 'block' : 'none';
          });
        }
        document.addEventListener('click', function(e) {
          if (mobileMenu && mobileMenuBtn && !mobileMenu.contains(e.target) && e.target !== mobileMenuBtn && !mobileMenuBtn.contains(e.target)) {
            mobileMenu.classList.remove('open');
            if (menuIcon) menuIcon.style.display = 'block';
            if (closeIcon) closeIcon.style.display = 'none';
          }
        });
        if (typeof updateCartCount === 'function') updateCartCount();
      });
    })();
  </script>
</body>
</html>
